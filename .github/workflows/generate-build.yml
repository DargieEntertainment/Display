name: Generate New Display Build

on:
  workflow_dispatch:
    inputs:
      folderName:
        description: 'Name of the new folder'
        required: true
      htmlContent:
        description: 'The HTML content for the new page'
        required: true

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create new folder and index.html
        run: |
          mkdir -p "${{ github.event.inputs.folderName }}"
          echo "${{ github.event.inputs.htmlContent }}" > "${{ github.event.inputs.folderName }}/index.html"

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Auto-generated build: ${{ github.event.inputs.folderName }}"
          git push
