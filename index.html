  const removed=S.user.deletedNotifs||[];
  const logs=[...DB.notifications].reverse().filter(n=>!removed.includes(n.id));
  const seen=S.user.seenNotifs||[];
  let html=`<div class="pg"><div class="pg-header"><div class="pg-title">Notification Log</div><div style="font-size:.64rem;color:var(--text4)">Auto-deleted after 21 days</div></div>`;
  if(!logs.length){
    html+=`<div class="empty-state"><span class="empty-icon">${ic("inbox",44)}</span><div class="empty-txt">No notifications sent yet.</div></div>`;
    return html+'</div>';
  }
  const st={red:{badge:'sb-red',dot:'sd-red',rule:''},
            amber:{badge:'sb-amber',dot:'sd-amber',rule:'sec-rule-a'},
            blue:{badge:'sb-blue',dot:'sd-blue',rule:'sec-rule-b'}};
  for(const cat of LOG_CATS){
    const items=logs.filter(n=>notifCat(n)===cat.key);
    if(!items.length)continue;
    const open=!!S.logOpen[cat.key];
    const unseen=items.filter(n=>!seen.includes(n.id)).length;
    const s=st[cat.color]||st.red;
    html+=`<div class="sec-hd log-sec-hd" data-log-sec="${cat.key}" style="cursor:pointer">
      <span class="sec-badge ${s.badge}"><span class="sec-dot ${s.dot}"></span>${ic(cat.icon,15)} ${cat.label}</span>
      <span class="sec-count">${items.length}</span>
      ${unseen?`<span class="log-bubble">${unseen}</span>`:''}
      <div class="sec-rule ${s.rule}"></div>
      <span class="log-sec-arrow">${open?'\u25BE':'\u25B8'}</span>
    </div>`;
    if(open){
      html+=sectionControls('log',cat);
      for(const n of items){
        html+=`<div class="log-item" style="position:relative${seen.includes(n.id)?'':';border-left:3px solid var(--red-dk)'}">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
            <div class="log-title" style="flex:1">${esc(n.title)}</div>
            <button class="notif-del-btn" data-del-log="${n.id}" title="Delete" style="margin-top:-2px;flex-shrink:0">\u{1F5D1}\uFE0F</button>
          </div>
          <div class="log-msg">${esc(n.msg)}</div>
          <div class="log-meta">
            <span class="log-chip">${ic("megaphone",13)} ${n.targets.length} recipient${n.targets.length!==1?'s':''}</span>
            <span class="log-chip">${ic("target",13)} ${esc(n.filterDesc)}</span>
            <span>${n.sentAt}</span>
          </div>
        </div>`;
      }
    }
  }
  html+='</div>';
  return html;
}

function openProfileDrawer(email){
  const u=DB.users[email];if(!u)return;
  const p=u.profile||{};
  const onContract=u.onContract,revoked=u.status==='revoked';
  const contractStart=u.contractStart||'';
  const contractEnd=u.contractEnd||'';
  const contractEndStr=contractEnd?dStr(new Date(contractEnd)):'';
  const sectionHtml=schemaFor().map(s=>{
    const val=pval(p,s.key);
    const vals=s.multi?(val||[]):(val?[val]:[]);
    if(!vals.length)return'';
    const isBasic=['gender','hair','eyes','age','build','height','eth'].includes(s.key);
    return`<div style="margin-bottom:14px">
      <div class="chip-group-label" style="margin-bottom:6px">${s.label}</div>
      <div class="mini-pills">${vals.map(v=>`<span class="${isBasic?'mpill':'mpill mpill-a'}">${esc(v)}</span>`).join('')}</div>
    </div>`;
  }).join('');

  const picSrc=u.profilePic||null;

  // ── Talent report (admins only see this drawer) ──
  const visL=DB.listings.filter(l=>listingVisibleTo(l,email));
  let rYes=0,rNo=0;
  visL.forEach(l=>{const r=(DB.responses[l.id]||{})[email];if(r==='yes')rYes++;else if(r==='no')rNo++;});
  const rNone=Math.max(0,visL.length-rYes-rNo);
  const audEv=DB.events.filter(ev=>(ev.confirmedEmails||[]).includes(email)&&((ev.type||(DB.listings.find(l=>l.id===ev.listingId)||{}).type)==='Audition'));
  let c1=0,c2=0,cS=0;
  audEv.forEach(ev=>{const r=((DB.results[ev.id]||{})[email]||{}).result;
    if(r==='Completed 1st Round')c1++;else if(r==='Completed 2nd Round')c2++;else if(r==='Successful End of Audition')cS++;});
  const succRate=audEv.length?Math.round(cS/audEv.length*100):null;
  const reportHtml=`
    <div style="margin:4px 0 16px">
      <div class="chip-group-label" style="margin-bottom:8px">${ic("bar-chart",15)} Talent report</div>
      <div style="display:flex;gap:7px;margin-bottom:7px">
        <div class="stat-box" style="flex:1"><div class="stat-n" style="color:#4caf7d">${rYes}</div><div class="stat-l">Interested</div></div>
        <div class="stat-box" style="flex:1"><div class="stat-n" style="color:#ff7777">${rNo}</div><div class="stat-l">Not interested</div></div>
        <div class="stat-box" style="flex:1"><div class="stat-n" style="color:var(--text3)">${rNone}</div><div class="stat-l">No response</div></div>
      </div>
      <div style="display:flex;gap:7px">
        <div class="stat-box" style="flex:1"><div class="stat-n" style="color:var(--amber-lt)">${audEv.length}</div><div class="stat-l">Auditions</div></div>
        <div class="stat-box" style="flex:1"><div class="stat-n" style="color:var(--text2)">${c1} / ${c2}</div><div class="stat-l">1st / 2nd round</div></div>
        <div class="stat-box" style="flex:1"><div class="stat-n" style="color:#8b5cf6">${succRate===null?'\u2014':succRate+'%'}</div><div class="stat-l">Success rate</div></div>
      </div>
      <div style="font-size:.6rem;color:var(--text4);margin-top:6px">Interest counts cover the ${visL.length} listing${visL.length!==1?'s':''} visible to this talent. Success rate = successful auditions \u00F7 confirmed auditions (${cS} of ${audEv.length}).</div>
      <div style="margin-top:12px">
        <div class="chip-group-label" style="margin-bottom:6px">${ic("bell",15)} Push notifications</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          ${LOG_CATS.map(c=>{const on=pushPrefOn(u,c.key);return `<span class="mpill" style="font-size:.58rem;${on?'':'opacity:.55;text-decoration:line-through'}">${c.label}: ${on?'On':'Off'}</span>`;}).join('')}
        </div>
      </div>
    </div>`;

  openDrawer(`
    <div class="drawer-header">
      <div style="display:flex;align-items:center;gap:14px;flex:1">
        <div class="drawer-talent-avatar">
          ${picSrc?`<img src="${picSrc}" alt="${esc(u.name)}"/>`:`${inits(u.name)}`}
        </div>
        <div>
          <div class="drawer-title">${esc(u.name)}</div>
          <div class="drawer-sub">${esc(u.email)} · Joined ${u.joined}</div>
          <div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap">
            ${revoked?'<span class="pill p-revoked">Revoked</span>':onContract?`<span class="pill p-contract">On contract${contractEndStr?' until '+contractEndStr:''}</span>`:'<span class="pill p-active">Active</span>'}
          </div>
        </div>
      </div>
      <button class="drawer-close" id="drawer-close">${ic("x",18)}</button>
    </div>
    <div class="drawer-scroll">
      <div class="card-hd" style="margin-bottom:14px">Talent profile</div>
      ${reportHtml}
      ${sectionHtml||'<p style="color:var(--text4);font-size:.8rem">No profile attributes set.</p>'}
    </div>
    <div class="drawer-footer">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${!revoked&&!onContract?`<button class="btn btn-purple btn-sm" data-opencontractform="${email}" style="flex:1">🗓 Set on contract</button>`:''}
        ${onContract?`<button class="btn btn-purple btn-sm" data-opencontractform="${email}" style="flex:1">🗓 Update contract</button>`:''}
        ${onContract?`<button class="btn btn-green btn-sm" data-clearcontract="${email}" style="flex:1">✓ Mark available</button>`:''}
        ${!revoked?`<button class="btn btn-danger btn-sm" data-revoke="${email}" style="flex:1">Revoke</button>`:''}
        ${revoked?`<button class="btn btn-amber btn-sm" data-restore="${email}" style="flex:1">✓ Reinstate</button>`:''}
        ${isMasterAdmin(S.user)&&!revoked&&u.role!=='admin'?`<button class="btn btn-promote btn-sm" data-promote="${email}" style="flex:0 0 auto">${ic("landmark",14)} Promote</button>`:''}
        ${isMasterAdmin(S.user)&&u.role==='admin'&&!u.isMaster?`<button class="btn btn-demote btn-sm" data-demote="${email}" style="flex:0 0 auto">${ic("landmark",14)} Demote</button>`:''}
        ${isMasterAdmin(S.user)&&revoked?`<button class="btn btn-danger btn-sm" data-deleteuser="${email}" style="flex:0 0 auto">${ic("trash",14)} Delete</button>`:''}
      </div>
    </div>`);
}

/* ══════════ EMAIL MODAL ══════════ */
function openEmailModal(listingId, mode, initialEmails){
  const l=DB.listings.find(x=>x.id===listingId);
  const title=mode==='confirm'?'Send Confirmation':'Send Reminder';
  const hint=mode==='confirm'
    ?"Sending a confirmation will add this event to the selected talent's calendar."
    :"Send a reminder to talent who selected Not Interested — check if they want to reconsider.";
  // Build initial recipient list from passed emails (only interested for confirm, not-interested for remind)
  const recips=initialEmails.map(e=>DB.users[e]).filter(Boolean).map(u=>({email:u.email,name:u.name}));
  S.emailModal={listingId,mode,recipients:recips};
  S.emailSearchQ='';
  renderEmailModalDOM(l,title,hint);
}

function renderEmailModalDOM(l,title,hint){
  const existing=document.getElementById('email-modal-overlay');
  if(existing)existing.remove();
  const overlay=document.createElement('div');
  overlay.className='email-modal-overlay';
  overlay.id='email-modal-overlay';

  const recips=S.emailModal.recipients;
  const mode=S.emailModal.mode;
  const lid=S.emailModal.listingId;

  overlay.innerHTML=`
    <div class="email-modal">
      <div class="email-modal-header">
        <div class="email-modal-title">${mode==='confirm'?'✅':'🔔'} ${esc(title||'')}</div>
        <button class="modal-close" id="em-close">✕</button>
      </div>
      <div class="email-modal-scroll">
        <p style="font-size:.74rem;color:var(--text3);margin-bottom:14px;line-height:1.55">${esc(hint||'')}</p>
        ${l?`<div style="background:#0a0a0a;border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:14px">
          <div style="font-family:var(--fh);font-weight:700;font-size:.78rem;color:var(--text)">${esc(l.icon||'')} ${esc(l.title)}</div>
          <div style="font-size:.68rem;color:var(--text3);margin-top:2px">${esc(l.sub||'')} · ${esc(l.date||'')}</div>
        </div>`:''}
        <div class="fg">
          <label class="fl">Send to</label>
          <div class="email-to-row" id="em-to-row">
            ${recips.map((r,i)=>`<span class="email-recip-chip">${esc(r.name)}<button data-rem-recip="${i}">×</button></span>`).join('')}
          </div>
          <input class="fi" id="em-search" type="text" placeholder="Add talent by name…" autocomplete="off" style="margin-bottom:4px"/>
          <div class="email-search-drop" id="em-search-drop"></div>
        </div>
        ${mode==='confirm'?`
        <div class="fg">
          <label class="fl">Event date &amp; time</label>
          <div class="fi-row2">
            <input class="fi" type="text" inputmode="numeric" placeholder="DD/MM/YYYY" maxlength="10" id="em-start-date"/>
            <input class="fi" type="time" id="em-start-time" placeholder="Start time"/>
          </div>
        </div>
        <div class="fg">
          <label class="fl">End date &amp; time (optional)</label>
          <div class="fi-row2">
            <input class="fi" type="text" inputmode="numeric" placeholder="DD/MM/YYYY" maxlength="10" id="em-end-date"/>
            <input class="fi" type="time" id="em-end-time" placeholder="End time"/>
          </div>
        </div>`:''}
        <div class="fg">
          <label class="fl">Subject</label>
          <input class="fi" id="em-subject" type="text" placeholder="${mode==='confirm'?'Booking confirmation — '+esc(l?.title||''):'Reminder — have you reconsidered?'}"/>
        </div>
        <div class="fg">
          <label class="fl">Message</label>
          <textarea class="fi" id="em-body" rows="4" placeholder="Write your message…"></textarea>
        </div>
        <div id="em-alert"></div>
      </div>
      <div class="email-modal-footer">
        <button class="btn btn-ghost" id="em-cancel" style="flex:0 0 auto">Cancel</button>
        <button class="btn btn-red" id="em-send" style="flex:1">${mode==='confirm'?`${ic("check-circle",15)} Send confirmation`:`${ic("bell",15)} Send reminder`}</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  // Set textarea default content safely (avoids template literal escape issues)
  const emBody=document.getElementById('em-body');
  if(emBody){
    emBody.value=mode==='confirm'
      ?"Congratulations! We're pleased to confirm your booking. Please find the event details above."
      :"Hi, we noticed you marked this opportunity as Not Interested. We wanted to reach out in case you'd like to reconsider.";
  }
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeEmailModal();});
  document.getElementById('em-close').onclick=closeEmailModal;
  document.getElementById('em-cancel').onclick=closeEmailModal;
  // Tap-to-pick DD/MM/YYYY calendar on event date fields (confirm mode only)
  attachAuDatePicker(document.getElementById('em-start-date'));
  attachAuDatePicker(document.getElementById('em-end-date'));

  // Remove recipient chip
  overlay.querySelectorAll('[data-rem-recip]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const idx=parseInt(btn.dataset.remRecip);
      S.emailModal.recipients.splice(idx,1);
      renderEmailModalDOM(l,title,hint);
    });
  });

  // Search input
  const searchIn=document.getElementById('em-search');
  const searchDrop=document.getElementById('em-search-drop');
  if(searchIn&&searchDrop){
    searchIn.addEventListener('input',()=>{
      const q=searchIn.value.trim().toLowerCase();
      if(!q){searchDrop.innerHTML='';return;}
      const already=S.emailModal.recipients.map(r=>r.email);
      // For confirm: only interested; for remind: only not-interested
      const lid2=S.emailModal.listingId;
      const resps=DB.responses[lid2]||{};
      const targetResp=S.emailModal.mode==='confirm'?'yes':'no';
      const pool=availTalent().filter(u=>resps[u.email]===targetResp&&!already.includes(u.email)&&
        (u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q))).slice(0,6);
      searchDrop.innerHTML=pool.map(u=>`<div class="email-search-item" data-add-recip="${u.email}" data-add-name="${esc(u.name)}">
        <div class="talent-avatar" style="width:26px;height:26px;font-size:.55rem;flex-shrink:0">${inits(u.name)}</div>
        <div><div style="font-size:.76rem;color:var(--text);font-family:var(--fh);font-weight:600">${esc(u.name)}</div>
        <div style="font-size:.62rem;color:var(--text3)">${esc(u.email)}</div></div>
      </div>`).join('');
      searchDrop.querySelectorAll('[data-add-recip]').forEach(el=>{
        el.addEventListener('click',()=>{
          S.emailModal.recipients.push({email:el.dataset.addRecip,name:el.dataset.addName});
          searchIn.value='';searchDrop.innerHTML='';
          renderEmailModalDOM(l,title,hint);
        });
      });
    });
  }

  // Send
  document.getElementById('em-send').addEventListener('click',()=>{
    const subj=document.getElementById('em-subject')?.value.trim();
    const body=document.getElementById('em-body')?.value.trim();
    if(!S.emailModal.recipients.length)return alert2('em-alert','alert-err','Please add at least one recipient.');
    if(!subj)return alert2('em-alert','alert-err','Please enter a subject.');
    if(!body)return alert2('em-alert','alert-err','Please enter a message.');

    const recips=S.emailModal.recipients;
    const mode2=S.emailModal.mode;
    const lid3=S.emailModal.listingId;
    const listing=DB.listings.find(x=>x.id===lid3);

    // Confirmations create a calendar booking, so the date and time are required
    let startISO=null,endISO=null;
    if(mode2==='confirm'&&listing){
      const sd=auToIso(document.getElementById('em-start-date')?.value);
      const st=document.getElementById('em-start-time')?.value;
      const ed=auToIso(document.getElementById('em-end-date')?.value);
      const et=document.getElementById('em-end-time')?.value;
      if(!sd||!st)return alert2('em-alert','alert-err','Please set the event date and start time — this creates the booking in the calendars.');
      if((ed&&!et)||(!ed&&et))return alert2('em-alert','alert-err','Set both an end date and end time, or leave both empty.');
      startISO=new Date(sd+'T'+st).toISOString();
      endISO=(ed&&et)?new Date(ed+'T'+et).toISOString():null;
      if(endISO&&endISO<=startISO)return alert2('em-alert','alert-err','The end must be after the start.');
    }

    // Notification for all recipients
    DB.notifications.push({
      id:Date.now().toString(),
      title:subj,msg:body,
      sentAt:nowStr(),sentBy:S.user.name,
      filterDesc:mode2==='confirm'?'Booking confirmation':'Reminder',
      category:mode2==='confirm'?'confirmation':'reminder',
      targets:recips.map(r=>r.email),
    });

    // Calendar event carrying the listing's details for talent and admin calendars
    if(mode2==='confirm'&&listing){
      listing.cast=true;   // greys the listing out on the noticeboard
      DB.events.push({
        id:'ev'+Date.now(),
        listingId:lid3,
        title:listing.title,
        sub:listing.sub,
        icon:listing.icon||'\u{1F4CB}',
        type:listing.type||'',
        details:listing.details||{},
        desc:listing.desc||'',
        startISO,endISO,
        confirmedEmails:recips.map(r=>r.email),
        reminderSent:false,
        createdAt:new Date().toISOString(),
      });
    }

    dbSave();
    closeEmailModal();
    fadeRender();
  });
}

  const el=document.getElementById('email-modal-overlay');
  if(el)el.remove();
  S.emailModal=null;
}

      <div class="resp-bar-wrap" style="margin-bottom:16px">
        <div class="resp-bar-row"><span class="resp-bar-label">${ic("thumbs-up",13)} Yes</span><div class="resp-bar-track"><div class="resp-bar-fill resp-bar-fill-green" style="width:${tot?Math.round(y.length/tot*100):0}%"></div></div><span class="resp-bar-count">${y.length}</span></div>
        <div class="resp-bar-row"><span class="resp-bar-label">${ic("thumbs-down",13)} No</span><div class="resp-bar-track"><div class="resp-bar-fill resp-bar-fill-red" style="width:${tot?Math.round(n.length/tot*100):0}%"></div></div><span class="resp-bar-count">${n.length}</span></div>
        <div class="resp-bar-row"><span class="resp-bar-label">— None</span><div class="resp-bar-track"><div class="resp-bar-fill resp-bar-fill-grey" style="width:${tot?Math.round(none.length/tot*100):0}%"></div></div><span class="resp-bar-count">${none.length}</span></div>
      </div>
      ${y.length?`<div class="card-hd" style="margin-bottom:8px">Interested (${y.length})</div>${y.map(u=>respRow(u,'yes')).join('')}`:''}
      ${n.length?`<div class="card-hd" style="margin-top:16px;margin-bottom:8px">Not interested (${n.length})</div>${n.map(u=>respRow(u,'no')).join('')}`:''}
      ${none.length?`<div class="card-hd" style="margin-top:16px;margin-bottom:8px">No response (${none.length})</div>${none.map(u=>respRow(u,'none')).join('')}`:''}
      ${contr.length?`<div class="card-hd" style="margin-top:16px;margin-bottom:8px;color:var(--purple-lt)">On contract — excluded (${contr.length})</div>${contr.map(u=>respRow(u,'contract')).join('')}`:''}
    </div>
    <div class="drawer-footer">
      <div style="display:flex;gap:8px">
        ${y.length?`<button class="btn btn-green btn-sm" data-email-modal="${lid}" data-email-mode="confirm" data-email-emails='${JSON.stringify(y.map(u=>u.email))}' style="flex:1">✅ Confirm (${y.length})</button>`:''}
        ${n.length?`<button class="btn btn-amber btn-sm" data-email-modal="${lid}" data-email-mode="remind" data-email-emails='${JSON.stringify(n.map(u=>u.email))}' style="flex:1">🔔 Remind (${n.length})</button>`:''}
        ${!y.length&&!n.length?'<div style="flex:1;text-align:center;font-size:.72rem;color:var(--text4);padding:8px">No responses to action yet.</div>':''}
      </div>
    </div>`);
}

/* ══════════ EVENT BINDING ══════════ */
function attachEvents(){
  /* login */
  on('btn-login',doLogin);
  on('go-reg',()=>{S.view='register';S.regStep=1;S.regData={};S.resetScrollOnRender=true;render();});
  on('go-forgot',()=>showForgotPasswordModal());
  on('go-login',()=>{S.view='login';S.resetScrollOnRender=true;render();});
  /* register */
  on('btn-reg1',doReg1);
  on('btn-back-reg',()=>{S.regStep=1;S.resetScrollOnRender=true;render();});
  on('btn-reg2',doReg2);
  /* profile */
  on('btn-change-pw',()=>showChangePasswordModal(false));
  /* listing toggles */
  qa('[data-toggle]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const id=el.dataset.toggle;
    S.openListings[id]=!S.openListings[id];
    // Rebuild ONLY this card in place — no page repaint, no flicker
    const card=document.getElementById('lc-'+id);
    const l=DB.listings.find(x=>x.id===id);
    if(card&&l){
      const u=S.user;
      const isDualUser=u.role==='admin'&&!u.isMaster;
      const viewingAsAdmin=u.role==='admin'&&(!isDualUser||S.viewMode==='admin');
      const isAdmin=viewingAsAdmin;
      // section colour → open-class, matched to the card's section
      const stOpen=card.dataset.openClass||'open';
      const wrap=document.createElement('div');
      wrap.innerHTML=renderListingCard(l,{u,canResp:!isAdmin,isAdmin,stOpen});
      const fresh=wrap.firstElementChild;
      card.replaceWith(fresh);
      attachEvents();
    }else{
      renderInPlace();
    }
  }));
  /* talent responses */
  qa('[data-resp]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const[lid,val]=el.dataset.resp.split(':');setResp(S.user.email,lid,val);render();}));
  /* inbox */
  qa('[data-markread]').forEach(el=>el.addEventListener('click',()=>{markRead(S.user.email,el.dataset.markread);render();}));

  /* delete calendar event (admin) */
  qa('[data-del-event]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const eid=el.dataset.delEvent;
    const ev=DB.events.find(x=>x.id===eid);
    showConfirm({
      question:'Delete this event?',
      sub:ev?`"${ev.title}" will be removed from the calendar for all confirmed talent.`:'This event will be permanently removed.',
      yesLabel:`${ic("trash",14)} Delete`,noLabel:'Cancel',yesClass:'btn-danger',
      onYes:()=>{
        DB.events=DB.events.filter(x=>x.id!==eid);
        dbSave();render();
      }
    });
  }));

  /* tap event card on calendar */






  /* tap event reminder notification in inbox -> go to calendar */
  qa('[data-go-calendar]').forEach(el=>el.addEventListener('click',()=>{
    markRead(S.user.email,el.dataset.markread||'');
    S.view='calendar';S.resetScrollOnRender=true;fadeRender();
  }));

  /* admin log delete */
  qa('[data-del-log]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const nid=el.dataset.delLog;
    showConfirm({
      question:'Remove this entry from your log?',
      sub:'Only your log is affected \u2014 other admins and talent keep the notification.',
      yesLabel:`${ic("trash",14)} Remove`,noLabel:'Keep',yesClass:'btn-danger',
      onYes:()=>{
        const del=S.user.deletedNotifs=S.user.deletedNotifs||[];
        if(!del.includes(nid))del.push(nid);
        if(DB.users[S.user.email])DB.users[S.user.email].deletedNotifs=del;
        dbSave();render();
      }
    });
  }));
  /* admin: applications */
  qa('[data-approve]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();DB.users[el.dataset.approve].status='active';dbSave();closeDrawer();render();}));
  qa('[data-reject]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();DB.users[el.dataset.reject].status='revoked';dbSave();closeDrawer();render();}));
  /* view profile drawer */
  qa('[data-viewprofile]').forEach(el=>el.addEventListener('click',()=>openProfileDrawer(el.dataset.viewprofile)));
  /* report drawer */
  qa('[data-report]').forEach(el=>el.addEventListener('click',()=>openReportDrawer(el.dataset.report)));
  /* admin Talent sub-tabs */
  qa('[data-subtab]').forEach(el=>el.addEventListener('click',()=>{
    S.adminTab=el.dataset.subtab;
    if(S.adminTab!=='notify'){S.notifyPreset=null;S.emailModal=null;}
    S.resetScrollOnRender=true;closeDrawer();render();
  }));

  /* listings management */
  on('btn-new-listing',()=>openListingFormDrawer(null));
  qa('[data-editlisting]').forEach(el=>el.addEventListener('click',()=>openListingFormDrawer(el.dataset.editlisting)));
  qa('[data-deletelisting]').forEach(el=>el.addEventListener('click',()=>openDeleteConfirmDrawer(el.dataset.deletelisting)));
  /* notify */
  qa('[data-fchip]').forEach(el=>el.addEventListener('click',()=>{
    const f=el.dataset.fchip,i=S.filterActive.indexOf(f);
    i>=0?S.filterActive.splice(i,1):S.filterActive.push(f);
    // snapshot form values
    const nt=$('notif-title');if(nt)S.notifTitle=nt.value;
    const nm=$('notif-msg');if(nm)S.notifMsg=nm.value;
    // update chip visual in-place without full re-render (prevents scroll jump)
    el.classList.toggle('on', S.filterActive.includes(f));
    // update target count label
    const targets=filteredTargets();
    const avail=availTalent();
    const countEl=$('notif-target-count');
    if(countEl){
      countEl.innerHTML=`📢 Will reach <strong>${targets.length}</strong> of ${avail.length} available talent${targets.length===avail.length?' (all)':''}`;
    }
    const sendBtn=$('btn-send-notif');
    if(sendBtn)sendBtn.textContent=`Send to ${targets.length} talent`;
  }));
  on('btn-send-notif',doSendNotif);
  on('btn-clear-preset',()=>{S.notifyPreset=null;render();});
  /* filter option editor */
  on('btn-filter-edit',()=>{S.filterEditMode=!S.filterEditMode;render();});
  qa('[data-schema-add]').forEach(el=>el.addEventListener('click',()=>{
    const key=el.dataset.schemaAdd;
    const inp=document.querySelector(`[data-schema-addinput="${key}"]`);
    const val=(inp&&inp.value||'').trim();
    if(!val)return;
    const cur=schemaFor().find(s=>s.key===key);
    if(cur&&cur.opts.some(o=>o.toLowerCase()===val.toLowerCase())){if(inp){inp.value='';inp.placeholder='Already exists';}return;}
    DB.schema=DB.schema||{};
    const c=DB.schema[key]=DB.schema[key]||{add:[],remove:[]};
    // if it was previously removed, un-remove; else add
    c.remove=(c.remove||[]).filter(r=>r.toLowerCase()!==val.toLowerCase());
    if(!(PS.find(s=>s.key===key)?.opts||[]).some(o=>o.toLowerCase()===val.toLowerCase())){
      c.add=c.add||[];
      if(!c.add.some(a=>a.toLowerCase()===val.toLowerCase()))c.add.push(val);
    }
    dbSave();render();
  }));
  qa('[data-schema-del]').forEach(el=>el.addEventListener('click',()=>{
    const i=el.dataset.schemaDel.indexOf('::');
    const key=el.dataset.schemaDel.slice(0,i),opt=el.dataset.schemaDel.slice(i+2);
    // count talent currently holding this option
    const users=Object.values(DB.users);
    let n=0;
    users.forEach(u=>{const v=(u.profile||{})[key];if(Array.isArray(v)?v.includes(opt):v===opt)n++;});
    showConfirm({
      question:`Remove \u201C${opt}\u201D?`,
      sub:n>0?`${n} talent currently ${n===1?'has':'have'} this selected \u2014 it will be removed from their profile too.`:'No talent currently have this selected.',
      yesLabel:`${ic('trash',14)} Remove`,noLabel:'Cancel',yesClass:'btn-danger',
      onYes:()=>{
        DB.schema=DB.schema||{};
        const c=DB.schema[key]=DB.schema[key]||{add:[],remove:[]};
        // if it was a custom-added option, just drop it from add; else record a removal
        c.add=(c.add||[]).filter(a=>a!==opt);
        const isDefault=(PS.find(s=>s.key===key)?.opts||[]).includes(opt);
        if(isDefault){c.remove=c.remove||[];if(!c.remove.includes(opt))c.remove.push(opt);}
        // strip it from every talent profile
        Object.keys(DB.users).forEach(email=>{
          const u=DB.users[email];const v=(u.profile||{})[key];if(v==null)return;
          if(Array.isArray(v)){const nv=v.filter(x=>x!==opt);if(nv.length!==v.length)u.profile[key]=nv;}
          else if(v===opt){u.profile[key]=null;}
        });
        dbSave();render();
      }
    });
  }));
  /* talent filter buttons */
  qa('[data-tfilter]').forEach(el=>el.addEventListener('click',()=>{
    S.talentFilter=el.dataset.tfilter;
    const scrollPos=$('scroll-area').scrollTop;
    $('content').innerHTML=renderUsers();
    $('scroll-area').scrollTop=scrollPos;
    attachEvents();
  }));

  /* email modal (confirm/remind) from reports */
  qa('[data-email-modal]').forEach(el=>el.addEventListener('click',()=>{
    const lid=el.dataset.emailModal;
    const mode=el.dataset.emailMode;
    const emails=JSON.parse(el.dataset.emailEmails||'[]');
    openEmailModal(lid,mode,emails);
  }));
  /* profile chips */

  /* profile picture upload */
  on('pic-file-input', null); // handled below via change
  const picInput=$('pic-file-input');
  if(picInput){
    picInput.addEventListener('change',e=>{
      const file=e.target.files[0];if(!file)return;
      downscaleImage(file,512,dataUrl=>{
        S.user.profilePic=dataUrl;
        if(DB.users[S.user.email])DB.users[S.user.email].profilePic=dataUrl;
        dbSave();render();
      });
    });
  }
  on('btn-remove-pic',()=>{
    S.user.profilePic=null;DB.users[S.user.email].profilePic=null;dbSave();render();
  });

  /* notification delete with confirm overlay */
  qa('[data-del-notif]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const nid=el.dataset.delNotif;
    showConfirm({
      question:'Delete this notification?',
      sub:'This will remove it from your inbox.',
      yesLabel:`${ic("trash",14)} Delete`,
      noLabel:'Keep it',
      yesClass:'btn-danger',
      onYes:()=>{
        // Remove from this user's visible list (mark as deleted for this user)
        const u=S.user;
        if(!u.deletedNotifs)u.deletedNotifs=[];
        u.deletedNotifs.push(nid);
        DB.users[u.email].deletedNotifs=u.deletedNotifs;
        dbSave();render();
      }
    });
  }));

  /* contract notification button in inbox -> go to noticeboard */
  qa('[data-go-board]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    markRead(S.user.email,el.dataset.goBoard||'');
    S.view='board';S.resetScrollOnRender=true;fadeRender();
  }));
}

function attachDrawerEvents(){
  on('drawer-close',closeDrawer);
  /* open contract date form */
  qa('[data-opencontractform]').forEach(el=>el.addEventListener('click',()=>openContractFormDrawer(el.dataset.opencontractform)));
  /* tap-to-pick DD/MM/YYYY calendar on contract date fields */
  attachAuDatePicker($('cf-start'));attachAuDatePicker($('cf-end'));
  /* save contract dates */
  on('btn-save-contract',e=>{
    const email=e.currentTarget.dataset.email;
    const startRaw=$('cf-start').value.trim(),endRaw=$('cf-end').value.trim();
    if(!startRaw||!endRaw)return alert2('contract-alert','alert-err','Please set both a start and end date.');
    const start=auToIso(startRaw),end=auToIso(endRaw);
    if(!start||!end)return alert2('contract-alert','alert-err','Please enter valid dates in DD/MM/YYYY format.');
    if(new Date(end)<=new Date(start))return alert2('contract-alert','alert-err','End date must be after start date.');
    const u=DB.users[email];
    u.onContract=true;u.contractStart=start;u.contractEnd=end;u.status='active';
    // Schedule the 4-week warning notification (stored, checked on login/render)
    dbSave();closeDrawer();render();
  });
  /* clear contract / mark available early */
  qa('[data-clearcontract]').forEach(el=>el.addEventListener('click',()=>{
    const u=DB.users[el.dataset.clearcontract];
    u.onContract=false;u.contractStart=null;u.contractEnd=null;
    u.contractWarningSent=false;
    dbSave();closeDrawer();render();
  }));
  /* revoke / restore */
  qa('[data-revoke]').forEach(el=>el.addEventListener('click',()=>{DB.users[el.dataset.revoke].status='revoked';dbSave();closeDrawer();render();}));
  qa('[data-restore]').forEach(el=>el.addEventListener('click',()=>{
    const u=DB.users[el.dataset.restore];
    u.status='active';u.onContract=false;u.contractStart=null;u.contractEnd=null;
    dbSave();closeDrawer();render();
  }));
  /* approve/reject applications */
  qa('[data-approve]').forEach(el=>el.addEventListener('click',()=>{DB.users[el.dataset.approve].status='active';dbSave();closeDrawer();render();}));
  qa('[data-reject]').forEach(el=>el.addEventListener('click',()=>{DB.users[el.dataset.reject].status='revoked';dbSave();closeDrawer();render();}));
  /* listing form */
  on('btn-add-field',()=>{
    const wrap=$('lf-fields');if(!wrap)return;
    const i=wrap.querySelectorAll('[data-field-row]').length;
    const row=document.createElement('div');
    row.className='detail-field-row';row.dataset.fieldRow=i;
    row.innerHTML=`<input class="fi lf-key" type="text" placeholder="Label" value=""/><input class="fi lf-val" type="text" placeholder="Value" value=""/>`;
    wrap.appendChild(row);
  });
  attachAuDatePicker($('lf-date'));
  on('btn-save-listing',doSaveListing);
  on('btn-reset-cast',e=>{
    const lid=e.currentTarget.dataset.resetid;
    showConfirm({
      question:'Reactivate this listing?',
      sub:'It becomes active on the noticeboard again and its booking is removed from calendars. Response history is kept.',
      yesLabel:`${ic("recycle",14)} Reactivate`,noLabel:'Cancel',yesClass:'btn-amber',
      onYes:()=>{
        const l=DB.listings.find(x=>x.id===lid);if(l)l.cast=false;
        DB.events=DB.events.filter(ev=>ev.listingId!==lid);
        dbSave();closeDrawer();render();
      }
    });
  });
  on('btn-cancel-listing',closeDrawer);
  on('btn-confirm-delete',e=>{doDeleteListing(e.currentTarget.dataset.delid);closeDrawer();});
  on('btn-cancel-delete',closeDrawer);

  /* promote talent to admin */
  qa('[data-promote]').forEach(el=>el.addEventListener('click',()=>{
    const email=el.dataset.promote;
    const u=DB.users[email];if(!u)return;
    showConfirm({
      question:`Promote ${u.name} to Administrator?`,
      sub:'They will gain access to the full Admin Portal and can switch between Management and Talent views.',
      yesLabel:'🏛 Yes, promote',
      noLabel:'Cancel',
      yesClass:'btn-red',
      onYes:()=>{u.role='admin';dbSave();closeDrawer();render();}
    });
  }));

  /* demote admin back to talent */
  qa('[data-demote]').forEach(el=>el.addEventListener('click',()=>{
    const email=el.dataset.demote;
    const u=DB.users[email];if(!u)return;
    showConfirm({
      question:`Remove admin access for ${u.name}?`,
      sub:'They will return to the Talent Portal only.',
      yesLabel:'Confirm',
      noLabel:'Cancel',
      yesClass:'btn-danger',
      onYes:()=>{u.role='talent';dbSave();closeDrawer();render();}
    });
  }));

  /* delete user entirely (master admin only) */
  qa('[data-deleteuser]').forEach(el=>el.addEventListener('click',()=>{
    const email=el.dataset.deleteuser;
    const u=DB.users[email];if(!u)return;
    showConfirm({
      question:`Delete ${u.name}?`,
      sub:'This permanently removes their account and all response data. This cannot be undone.',
      yesLabel:`${ic("trash",14)} Delete permanently`,
      noLabel:'Cancel',
      yesClass:'btn-danger',
      onYes:()=>{
        delete DB.users[email];
        // remove their responses
        for(const lid of Object.keys(DB.responses)){
          delete DB.responses[lid][email];
        }
        dbSave();closeDrawer();render();
      }
    });
  }));

  /* listing form: visibility toggles */
  const visOptAll=$('lf-vis-all'),visOptSpec=$('lf-vis-specific'),visOptExcl=$('lf-vis-exclude');
  function updateVisUI(){
    [visOptAll,visOptSpec,visOptExcl].forEach(el=>{if(el)el.classList.remove('selected');});
    const activeOpt=S.lfVis==='all'?visOptAll:S.lfVis==='specific'?visOptSpec:visOptExcl;
    if(activeOpt)activeOpt.classList.add('selected');
    // Sync checkbox inputs
    [visOptAll,visOptSpec,visOptExcl].forEach(el=>{
      if(!el)return;
      const cb=el.querySelector('input[type=checkbox]');
      if(cb)cb.checked=el.classList.contains('selected');
    });
    const wrap=$('lf-talent-search-wrap');
    if(wrap)wrap.style.display=(S.lfVis==='all')?'none':'block';
    // Update description text
    const descEl=$('lf-vis-desc');
    if(descEl)descEl.innerHTML=S.lfVis==='specific'
      ?'Only the selected talent will see this listing.'
      :'Everyone <em>except</em> the selected talent will see this listing.';
    renderSelectedTalentChips();
  }
  if(visOptAll)visOptAll.addEventListener('click',()=>{S.lfVis='all';updateVisUI();});
  if(visOptSpec)visOptSpec.addEventListener('click',()=>{S.lfVis='specific';updateVisUI();});
  if(visOptExcl)visOptExcl.addEventListener('click',()=>{S.lfVis='exclude';updateVisUI();});

  /* talent search input */
  const tsInput=$('lf-talent-search');
  if(tsInput){
    tsInput.addEventListener('input',()=>{
      S.lfSearchQ=tsInput.value.trim().toLowerCase();
      renderTalentSearchResults();
    });
  }
  updateVisUI();
}

function renderTalentSearchResults(){
  const wrap=$('lf-search-results');if(!wrap)return;
  const q=S.lfSearchQ;
  if(!q){wrap.innerHTML='';return;}
  const already=S.lfSelTalent.map(t=>t.email);
  const matches=activeTalent().filter(u=>
    !already.includes(u.email)&&
    (u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q))
  ).slice(0,8);
  if(!matches.length){wrap.innerHTML='<div style="padding:8px 10px;font-size:.72rem;color:var(--text4)">No matches found</div>';return;}
  wrap.innerHTML=matches.map(u=>`
    <div class="talent-search-item" data-addtalent="${u.email}" data-addname="${esc(u.name)}">
      <div class="talent-avatar" style="width:26px;height:26px;font-size:.55rem;flex-shrink:0">${inits(u.name)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:.76rem;color:var(--text);font-family:var(--fh);font-weight:600">${esc(u.name)}</div>
        <div style="font-size:.64rem;color:var(--text3)">${esc(u.email)}</div>
      </div>
    </div>`).join('');
  wrap.querySelectorAll('[data-addtalent]').forEach(el=>el.addEventListener('click',()=>{
    S.lfSelTalent.push({email:el.dataset.addtalent,name:el.dataset.addname});
    S.lfSearchQ='';
    const inp=$('lf-talent-search');if(inp)inp.value='';
    wrap.innerHTML='';
    renderSelectedTalentChips();
  }));
}

function renderSelectedTalentChips(){
  const wrap=$('lf-selected-talent');if(!wrap)return;
  if(!S.lfSelTalent.length){wrap.innerHTML='<div style="font-size:.7rem;color:var(--text4);padding:2px 0">No talent selected yet</div>';return;}
  wrap.innerHTML=S.lfSelTalent.map((t,i)=>`
    <span class="sel-talent-chip">

}

async function doLogin(){
  const email=$('li-email').value.trim().toLowerCase();
  const pw=$('li-pw').value;
  if(!email.includes('@'))return alert2('login-alert','alert-err','Enter a valid email address.');
  if(!pw)return alert2('login-alert','alert-err','Enter your password.');
  if(!FB_OK)return alert2('login-alert','alert-err','No internet connection. Please check your connection and try again.');
  const btn=$('btn-login');if(btn){btn.disabled=true;btn.textContent='Signing in…';}
  try{
    await AUTH.signInWithEmailAndPassword(email,pw);
    const doc=await FS.collection('users').doc(email).get();
    if(!doc.exists){await AUTH.signOut();return alert2('login-alert','alert-err','No profile found for this account. Contact the agency.');}
    const u=doc.data();
    if(u.status==='revoked'){await AUTH.signOut();return alert2('login-alert','alert-err','Your access has been deactivated. Contact the agency.');}
    if(u.status==='pending'){await AUTH.signOut();return alert2('login-alert','alert-info','Your application is under review. The agency team will be in touch.');}
    DB.users[email]=u;
    S.user=u;
    if(u.role==='admin'){S.viewMode='admin';S.view='admin';S.adminTab='applications';}
    else{S.viewMode='talent';S.view='board';}
    S.resetScrollOnRender=true;
    checkContractDates();render();
  }catch(err){
    if(err&&err.code==='auth/user-not-found')showNoAccountModal();
    else alert2('login-alert','alert-err',fbErrMsg(err));
  }finally{
    const b=$('btn-login');if(b){b.disabled=false;b.textContent='Sign in';}
  }
}

function filteredTargets(){
  const av=availTalent();
  if(!S.filterActive.length)return av;
  return av.filter(u=>{
    const p=u.profile||{};
    return S.filterActive.every(f=>{
      for(const v of Object.values(p)){if(Array.isArray(v)&&v.includes(f))return true;if(v===f)return true;}
      return false;
    });
  });
}
function doSendNotif(){
  const title=$('notif-title')?.value.trim();
  const msg=$('notif-msg')?.value.trim();
  if(!title)return alert('Please enter a notification title.');
  if(!msg)return alert('Please enter a message.');
  const preset=S.notifyPreset;
  const targets=preset?preset.emails.map(e=>DB.users[e]).filter(Boolean):filteredTargets();
  if(!targets.length)return alert('No talent match the selected criteria.');
  const filterDesc=preset?preset.label:(S.filterActive.length?S.filterActive.join(', '):'All available talent');
  DB.notifications.push({
    id:Date.now().toString(),title,msg,sentAt:nowStr(),sentBy:S.user.name,
    filterDesc,category:'announcement',targets:targets.map(u=>u.email)
  });
  S.notifTitle='';S.notifMsg='';S.filterActive=[];S.notifyPreset=null;
  dbSave();S.adminTab='log';S.resetScrollOnRender=true;fadeRender();

/* ─── Contract auto-checks ────────────────────────────── */
function checkContractDates(){
  const now=new Date();
  const fourWeeksMs=28*864e5;
  let changed=false;
  for(const u of allTalent()){
    if(!u.onContract||!u.contractEnd)continue;
    const endDate=new Date(u.contractEnd);
    // Auto-expire: end date has passed → switch to active
    if(endDate<=now){
      u.onContract=false;u.contractWarningSent=false;
      u.contractStart=null;u.contractEnd=null;
      changed=true;
    }
    // 4-week warning: end date within 4 weeks, warning not yet sent
    else if(!u.contractWarningSent&&(endDate-now)<=fourWeeksMs){
      const nid='cw_'+Date.now()+'_'+u.id;
      DB.notifications.push({
        id:nid,
        title:'Coming to the end of your contract!',
        msg:'Congratulations on coming to the last few weeks of your contract! We are excited to see you again soon and can\'t wait to see what\'s coming up next.',
        sentAt:nowStr(),sentBy:'Dargie Agency',
        filterDesc:'Contract warning',category:'contract',
        targets:[u.email],
        isContractMsg:true,
        responded:false,
      });
      u.contractWarningSent=true;
      changed=true;
    }
  }
  if(changed)dbSave();
}

  overlay.innerHTML=`
    <div class="fpw-modal">
      <div class="fpw-header">
        <div class="fpw-title">${ic("key",18)} Forgot password</div>
        <button class="modal-close" id="fpw-close-x">${ic("x",18)}</button>
      </div>
      <div class="fpw-body">
        <div style="font-size:.78rem;color:var(--text3);line-height:1.6;margin-bottom:14px">Enter your account email and we'll send you a link to reset your password.</div>
        <div class="fg"><label class="fl">Email address</label><input class="fi" type="email" id="fpw-email" placeholder="you@example.com"/></div>
        <div id="fpw-alert"></div>
      </div>
      <div class="fpw-footer">
        <button class="btn btn-red btn-full" id="fpw-send">Send reset link</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  document.getElementById('fpw-close-x').onclick=()=>overlay.remove();
  document.getElementById('fpw-send').onclick=async()=>{
    const email=document.getElementById('fpw-email').value.trim().toLowerCase();
    if(!email.includes('@'))return alert2('fpw-alert','alert-err','Please enter a valid email address.');
    if(!FB_OK)return alert2('fpw-alert','alert-err','No internet connection. Please try again.');
    const btn=document.getElementById('fpw-send');btn.disabled=true;btn.textContent='Sending…';
    try{
      await AUTH.sendPasswordResetEmail(email);
      overlay.querySelector('.fpw-body').innerHTML=`
        <div style="text-align:center;padding:20px 0">
          <div style="font-size:2.5rem;margin-bottom:12px">\u{1F4E9}</div>
          <div style="font-family:var(--fh);font-weight:700;font-size:.9rem;color:var(--text);margin-bottom:8px">Check your email</div>
          <div style="font-size:.78rem;color:var(--text3);line-height:1.6">If an account exists for <strong style="color:var(--text2)">${email}</strong>, a password reset link is on its way. Check your spam folder if you don't see it.</div>
        </div>`;
      overlay.querySelector('.fpw-footer').innerHTML=`<button class="btn btn-red btn-full" id="fpw-done">Back to sign in</button>`;
      document.getElementById('fpw-done').onclick=()=>overlay.remove();
    }catch(err){
      alert2('fpw-alert','alert-err',fbErrMsg(err));
      btn.disabled=false;btn.textContent='Send reset link';
    }
  };
}

function submitAuditionResult(evId){
  const ev=DB.events.find(x=>x.id===evId);if(!ev||!S.user)return;
  const opt=S.resultDraft[evId]||((DB.results[evId]||{})[S.user.email]||{}).result;
  if(!opt)return;
  DB.results[evId]=DB.results[evId]||{};
  DB.results[evId][S.user.email]={result:opt,at:nowStr()};
  const admins=Object.values(DB.users).filter(x=>x.role==='admin'&&x.status==='active').map(x=>x.email);
  DB.notifications.push({
    id:Date.now().toString(),
    title:'Audition result \u2014 '+ev.title,
    msg:S.user.name+': '+opt,
    sentAt:nowStr(),sentBy:S.user.name,
    filterDesc:'Audition result',category:'result',
    targets:admins,
  });
  dbSave();render();
}

/* ══════════ INTRO ANIMATION ══════════ */
function playIntro(){
  const scr=document.querySelector('.login-screen');
  if(!scr)return;
  scr.classList.add('intro-wait');
  const o=document.createElement('div');o.id='intro-overlay';
  document.body.appendChild(o);
  const timers=[];const after=(ms,fn)=>timers.push(setTimeout(fn,ms));
  let done=false;
  const finish=()=>{           // also fired by tap-to-skip
    if(done)return;done=true;
    timers.forEach(clearTimeout);
    scr.classList.remove('intro-wait');
    o.remove();
  };
  o.addEventListener('pointerdown',finish);
  // The native splash has already shown the D; hold black just long enough
  // for first paint, then fade straight into the login page.
  after(200,()=>{o.classList.add('out');scr.classList.remove('intro-wait');});
  after(950,finish);
}

/* Inbox/log sections, calendar expand, audition results, Google Calendar:
   one permanent delegated listener — immune to render timing and to any
   earlier script error on a particular device. */
function toggleNotifSection(kind,key){
  const openMap=kind==='inbox'?S.inboxOpen:S.logOpen;
  openMap[key]=!openMap[key];
  if(openMap[key]&&S.user){
    const seen=S.user.seenNotifs=S.user.seenNotifs||[];
    let changed=false;
    DB.notifications.filter(n=>notifCat(n)===key&&(kind==='log'||n.targets.includes(S.user.email))).forEach(n=>{
      if(!seen.includes(n.id)){seen.push(n.id);changed=true;}
    });
    if(DB.users[S.user.email])DB.users[S.user.email].seenNotifs=seen;
    if(changed)dbSave();
  }
  render();
}
document.addEventListener('change',e=>{
  const pp=e.target.closest('[data-push-pref]');
  if(pp&&S.user){
    const key=pp.dataset.pushPref;
    S.user.pushPrefs=S.user.pushPrefs||{};
    S.user.pushPrefs[key]=pp.checked;   // false = off
    if(DB.users[S.user.email])DB.users[S.user.email].pushPrefs=S.user.pushPrefs;
    dbSave();
  }
});
document.addEventListener('click',e=>{
  const da=e.target.closest('[data-delall]');
  if(da){
    e.stopPropagation();
    const [kind,key]=da.dataset.delall.split('::');
    const label=(LOG_CATS.find(c=>c.key===key)||{}).label||'these';
    showConfirm({
      question:'Delete all in '+label+'?',
      sub:'Removes every notification in this section from your '+(kind==='log'?'log':'alerts')+'. Others are unaffected.',
      yesLabel:`${ic("trash",14)} Delete all`,noLabel:'Cancel',yesClass:'btn-danger',
      onYes:()=>{
        const del=S.user.deletedNotifs=S.user.deletedNotifs||[];
        DB.notifications.forEach(n=>{
          if(notifCat(n)!==key)return;
          if(kind==='inbox'&&!n.targets.includes(S.user.email))return;
          if(!del.includes(n.id))del.push(n.id);
        });
        if(DB.users[S.user.email])DB.users[S.user.email].deletedNotifs=del;
        dbSave();render();
      }
    });
    return;
  }
  const isec=e.target.closest('[data-inbox-sec]');
  if(isec){toggleNotifSection('inbox',isec.dataset.inboxSec);return;}
  const lsec=e.target.closest('[data-log-sec]');
  if(lsec){toggleNotifSection('log',lsec.dataset.logSec);return;}
  const ex=e.target.closest('[data-ev-expand]');
  if(ex){e.stopPropagation();S.expandedEvents[ex.dataset.evExpand]=!S.expandedEvents[ex.dataset.evExpand];render();return;}
  const ro=e.target.closest('[data-res-opt]');
  if(ro){e.stopPropagation();const i=ro.dataset.resOpt.indexOf('::');S.resultDraft[ro.dataset.resOpt.slice(0,i)]=ro.dataset.resOpt.slice(i+2);render();return;}
  const rs=e.target.closest('[data-res-submit]');
  if(rs){e.stopPropagation();submitAuditionResult(rs.dataset.resSubmit);return;}
  const g=e.target.closest('[data-gcal]');
  if(g){e.stopPropagation();const ev=DB.events.find(x=>x.id===g.dataset.gcal);if(ev)openExternal(gcalUrl(ev));return;}
});

/* On-screen error reporter: if anything breaks on a device, it says so. */
function showErrStrip(msg){
  let el=document.getElementById('err-strip');
  if(!el){
    el=document.createElement('div');el.id='err-strip';
    el.style.cssText='position:fixed;left:0;right:0;bottom:0;z-index:1200;background:#7a0000;color:#fff;font-size:11px;line-height:1.4;padding:8px 36px 8px 10px;font-family:monospace;word-break:break-all;box-shadow:0 -4px 16px rgba(0,0,0,.5)';
    const x=document.createElement('div');x.textContent='\u2715';
    x.style.cssText='position:absolute;right:8px;top:5px;padding:4px 6px;font-size:14px;cursor:pointer';
    x.onclick=()=>el.remove();
    el.appendChild(x);
    const t=document.createElement('div');t.id='err-strip-txt';el.appendChild(t);
    document.body.appendChild(el);
  }
  document.getElementById('err-strip-txt').textContent=msg;
}
window.addEventListener('error',e=>showErrStrip('Error: '+(e.message||e.type)+' @ line '+(e.lineno||'?')));
window.addEventListener('unhandledrejection',e=>showErrStrip('Async error: '+((e.reason&&(e.reason.message||e.reason.code))||e.reason||'unknown')));

/* Profile/registration attribute chips: one permanent delegated listener.
   Cannot be skipped by render timing or earlier binding failures. */
document.addEventListener('click',e=>{
  const chip=e.target.closest('.chips .chip');
  if(!chip||chip.dataset.readonly)return;
  const group=chip.closest('[data-key]');
  if(!group)return;
  const key=group.dataset.key,multi=group.dataset.multi==='true',ctx=group.dataset.ctx;
  const val=chip.dataset.val;
  let target;
  if(ctx==='profile'){
    if(!S.user)return;
    S.user.profile=S.user.profile||{};
    if(DB.users[S.user.email])DB.users[S.user.email].profile=S.user.profile;
    target=S.user.profile;
  }else{
    target=(S.regData.profile=S.regData.profile||{});
  }
  if(multi){
    if(!Array.isArray(target[key]))target[key]=[];
    const idx=target[key].indexOf(val);
    idx>=0?target[key].splice(idx,1):target[key].push(val);
    chip.classList.toggle('on');
  }else{
    target[key]=target[key]===val?null:val;
    group.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
    if(target[key])chip.classList.add('on');
  }
  if(ctx==='profile')dbSave();   // selections save instantly
});

/* ══════════ AMBIENT BACKGROUND FX ══════════ */
function buildAmbience(){
  const fx=document.getElementById('fx-layer');
  if(!fx||fx.dataset.built)return;
  fx.dataset.built='1';
  // Red glow blobs — subtle, alternating edges. Tuned down for phone screens.
  const NB=4;
  for(let b=0;b<NB;b++){
    const bl=document.createElement('span');bl.className='fx-blob';
    const size=200+Math.random()*160;
    bl.style.width=bl.style.height=size+'px';
    bl.style.top=((b+0.15+Math.random()*0.5)/NB*100)+'%';
    if(b%2===0)bl.style.left=(-size*0.35)+'px';else bl.style.right=(-size*0.35)+'px';
    bl.style.background=(b%3===2)?'var(--red-dk)':'var(--red)';
    bl.style.animationDelay=(Math.random()*6).toFixed(2)+'s';
    bl.style.animationDuration=(9+Math.random()*5).toFixed(2)+'s';
    fx.appendChild(bl);
  }
}
let _sparkTimer=null;
function setLoginSparkles(on){
  const fx=document.getElementById('fx-layer');if(!fx)return;
  fx.querySelectorAll('.fx-spark').forEach(s=>s.remove());
  if(!on)return;
  const N=14;
  const place=sp=>{
    sp.style.top=(Math.random()*94+3)+'%';
    sp.style.left=(Math.random()*90+5)+'%';
    const sc=0.6+Math.random()*0.8;
    sp.style.width=sp.style.height=(5*sc).toFixed(1)+'px';
  };
  for(let k=0;k<N;k++){
    const sp=document.createElement('span');sp.className='fx-spark';
    place(sp);
    sp.style.animationDelay=(Math.random()*5).toFixed(2)+'s';
    sp.style.animationDuration=(3.5+Math.random()*3).toFixed(2)+'s';
    sp.addEventListener('animationiteration',e=>place(e.target));
    fx.appendChild(sp);
  }
}

/* ══════════ BOOT ══════════ */
dbLoad();seed();buildAmbience();render();playIntro();
if(FB_OK){
  AUTH.onAuthStateChanged(async fbUser=>{
    if(_registering)return;   // sign-up manages its own auth lifecycle
    if(fbUser){
      attachCloudListeners();
      if(!S.user){
        // Restore the session: signed in on this device previously
        try{
          const email=(fbUser.email||'').toLowerCase();
          const doc=await FS.collection('users').doc(email).get();
          if(doc.exists){
            const u=doc.data();
            if(u.status==='active'){
              DB.users[email]=u;S.user=u;
              if(u.role==='admin'){S.viewMode='admin';S.view='admin';S.adminTab='applications';}
              else{S.viewMode='talent';S.view='board';}
              S.resetScrollOnRender=true;checkContractDates();render();
            }else{AUTH.signOut();}
          }else{AUTH.signOut();}
        }catch(e){console.error('session restore',e);}
      }
    }else{
      if(_usersUnsub){_usersUnsub();_usersUnsub=null;}
      detachCloudListeners();
      _cloudUsers={};DB.users={};DB.listings=[];DB.notifications=[];DB.events=[];DB.responses={};DB.results={};DB.schema={};_cloudSchema='{}';
      if(S.user){
        S.user=null;S.view='login';S.openListings={};
        const sh=$('shell');if(sh)sh.classList.remove('admin-mode');
        closeDrawer();render();
      }
    }
  });
}
