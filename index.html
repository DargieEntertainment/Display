<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
<title>Dargie Entertainment</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Lato:wght@300;400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#c41010;--red-dk:#7a0000;--red-lt:#ff5555;--red-bg:rgba(122,0,0,.18);
  --amber:#c47a00;--amber-lt:#ffb833;--amber-bg:rgba(196,122,0,.15);
  --green:#1a6b1a;--green-lt:#55dd55;--green-bg:rgba(26,107,26,.18);
  --purple:#6a1a8a;--purple-lt:#cc88ff;--purple-bg:rgba(106,26,138,.18);
  --bg:#0b0b0c;--bg2:#141416;--bg3:#1a1a1d;
  /* Elevation ladder: each surface a touch lighter than the one below it */
  --elev-1:#141417;--elev-2:#1c1c20;--elev-3:#242429;
  --card:#1a1a1e;--border:#26262b;--border2:#34343a;
  /* Hairline that catches light along a card's top edge */
  --border-hi:rgba(255,255,255,.055);
  --text:#ececee;--text2:#a6a6ad;--text3:#6a6a72;--text4:#46464d;
  /* Radii scale */
  --r-xs:8px;--r-sm:10px;--r:14px;--r-lg:18px;--r-pill:999px;
  /* Spacing scale */
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-6:24px;
  /* Shadows */
  --shadow-1:0 1px 3px rgba(0,0,0,.35);
  --shadow-2:0 4px 16px rgba(0,0,0,.4);
  --shadow-3:0 12px 32px rgba(0,0,0,.5);
  --fh:'Montserrat',sans-serif;--fb:'Lato',sans-serif;
  --nav-h:56px;--bot-h:64px;
}
.ic{display:inline-block;vertical-align:-.18em;flex-shrink:0;color:var(--text)}
.bnav-icon .ic{width:22px;height:22px}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px}
button{font-family:var(--fb);cursor:pointer;border:none;background:none}
input,textarea,select{font-family:var(--fb);font-size:14px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}

/* ── SHELL ─────────────────────────────────────────── */
#shell{height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
#shell.admin-mode{max-width:860px}

/* ── TOP NAV ────────────────────────────────────────── */
#top-nav{height:calc(var(--nav-h) + env(safe-area-inset-top,0px));background:rgba(16,10,10,.72);-webkit-backdrop-filter:blur(18px) saturate(1.4);backdrop-filter:blur(18px) saturate(1.4);border-bottom:1px solid rgba(122,0,0,.35);display:flex;align-items:center;padding:env(safe-area-inset-top,0px) 16px 0;gap:10px;flex-shrink:0;z-index:100;overflow:hidden}
.tn-logo{font-family:var(--fh);font-weight:900;font-size:1.15rem;color:var(--red-lt);letter-spacing:.04em;line-height:1;flex-shrink:0}
.tn-logo-img{height:38px;width:auto;display:block;flex-shrink:0}
.tn-logo-sub{font-size:.38rem;letter-spacing:.4em;color:var(--text4);font-weight:400;display:block;margin-top:1px}
.tn-pipe{width:1px;height:24px;background:#3a0000;flex-shrink:0}
.tn-spacer{flex:1}
.tn-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.tn-avatar{width:30px;height:30px;border-radius:50%;background:#3a0000;border:1.5px solid #600000;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:700;font-size:.6rem;color:#ffaaaa;flex-shrink:0}
.tn-signout{font-size:.6rem;color:var(--text3);padding:4px 8px;border:1px solid var(--border2);border-radius:20px;font-family:var(--fh);font-weight:600;letter-spacing:.04em;transition:all .15s;white-space:nowrap}
.tn-signout:hover{color:var(--text2);border-color:#555}
.tn-badge-admin{background:#4a0000;color:#ff9999;font-size:.48rem;padding:2px 5px;border-radius:3px;font-family:var(--fh);font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}

/* ── SCROLL AREA ────────────────────────────────────── */
#scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--bot-h) + 16px);position:relative;z-index:1}
/* Ambient background FX — behind all content, never interactive */
#fx-layer{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
#top-nav,#bot-nav,#admin-sidenav{position:relative;z-index:2}
.fedit-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:1px solid var(--border2);color:var(--text2);border-radius:var(--r-xs);padding:4px 9px;font-size:.62rem;font-family:var(--fh);font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.fedit-btn.on{background:var(--amber);border-color:var(--amber-lt);color:#000}
.fchip-edit{display:inline-flex;align-items:center;gap:5px;background:#151515;border:1px dashed var(--border2);color:var(--text2);cursor:default}
.fchip-x{display:inline-flex;align-items:center;justify-content:center;background:rgba(122,0,0,.35);border:none;border-radius:50%;width:17px;height:17px;color:#ffbbbb;cursor:pointer;padding:0}
.fchip-x:active{background:var(--red-dk)}
.fchip-add-row{display:flex;gap:6px;margin-top:8px;align-items:center}
.fchip-add-input{flex:1;background:#0f0f0f;border:1px solid var(--border2);border-radius:var(--r-xs);color:var(--text);padding:7px 10px;font-size:.74rem;font-family:var(--fb)}
.fchip-add-input:focus{outline:none;border-color:var(--amber)}
.fx-blob{position:absolute;border-radius:50%;filter:blur(76px);opacity:.11;animation:fxpulse 11s ease-in-out infinite;will-change:transform,opacity}
@keyframes fxpulse{0%,100%{transform:scale(1);opacity:.08}50%{transform:scale(1.15);opacity:.17}}
.fx-spark{position:absolute;border-radius:50%;background:#fff;box-shadow:0 0 8px 2px rgba(255,255,255,.55);opacity:0;animation:fxtw 5s ease-in-out infinite;will-change:opacity,transform}
@keyframes fxtw{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:.8;transform:scale(1)}}
@media(prefers-reduced-motion:reduce){.fx-blob,.fx-spark{animation:none}.fx-spark{opacity:.4}}

/* ── BOTTOM NAV (talent) ────────────────────────────── */
#bot-nav{height:calc(var(--bot-h) + env(safe-area-inset-bottom,0px));background:rgba(17,17,19,.8);-webkit-backdrop-filter:blur(20px) saturate(1.3);backdrop-filter:blur(20px) saturate(1.3);border-top:1px solid var(--border-hi);display:flex;align-items:stretch;padding-bottom:env(safe-area-inset-bottom,0px);flex-shrink:0;z-index:100}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;transition:all .15s;position:relative}
.bnav-btn .bnav-icon{transition:transform .18s cubic-bezier(.34,1.56,.64,1)}
.bnav-btn.active .bnav-icon{transform:translateY(-2px)}
.bnav-btn:active .bnav-icon{transform:scale(.88)}
.bnav-icon{font-size:1.3rem;line-height:1;transition:transform .15s;color:var(--text2)}
.bnav-btn.active .bnav-icon{color:var(--red-lt)}
.bnav-label{font-family:var(--fh);font-weight:700;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text4);transition:color .15s}
.bnav-btn.active .bnav-label{color:var(--red-lt)}
.bnav-btn.active .bnav-icon{transform:translateY(-1px)}
.bnav-btn:after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--red);border-radius:2px 2px 0 0;opacity:0;transition:opacity .15s}
.bnav-btn.active:after{opacity:1}
.bnav-badge{position:absolute;top:8px;right:calc(50% - 14px);background:var(--red);color:#fff;font-size:.5rem;font-weight:700;font-family:var(--fh);width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* ── ADMIN SIDE NAV (horizontal scroll tabs) ─────────── */
#admin-sidenav{display:block;background:#0f0f0f;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;padding:0 12px}
#admin-sidenav::-webkit-scrollbar{display:none}
#admin-sidenav .anav-tabs{display:flex;gap:0;min-width:max-content}
.anav-tab{padding:11px 14px;font-family:var(--fh);font-weight:700;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text4);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;position:relative}
.anav-tab:hover{color:var(--text2)}
.anav-tab.active{color:var(--amber-lt);border-bottom-color:var(--amber)}
.anav-tab-badge{background:#5a3800;color:var(--amber-lt);font-size:.48rem;padding:1px 4px;border-radius:2px;font-weight:700;margin-left:4px;vertical-align:middle}

/* ── PAGE SECTIONS ──────────────────────────────────── */
.pg{padding:var(--sp-6) var(--sp-4) var(--sp-2)}
.admin-mode .pg{padding:var(--sp-6) var(--sp-6) var(--sp-2)}
.pg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-6)}
.pg-title{font-family:var(--fh);font-weight:800;font-size:1.35rem;letter-spacing:-.01em;color:var(--text);line-height:1.1}
.hidden{display:none!important}

/* ── LOGIN ──────────────────────────────────────────── */
.login-screen{padding:calc(32px + 14vh) 20px 40px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%}
.login-logo-wrap{text-align:center;margin:0}
.login-logo-img{width:min(320px,78vw);aspect-ratio:880/292;display:block;margin:0 auto;filter:drop-shadow(0 0 32px rgba(200,20,20,.22))}
.login-logo-txt{font-family:var(--fh);font-weight:900;font-size:3rem;color:var(--red-lt);letter-spacing:.06em;line-height:1;text-shadow:0 0 40px rgba(200,20,20,.3)}
.login-logo-sub{font-size:.58rem;letter-spacing:.55em;color:var(--text4);text-transform:uppercase;margin-top:4px;display:block}
.login-tagline{font-size:.78rem;color:var(--text3);margin:24px 0;font-style:italic;letter-spacing:.08em}
/* ── INTRO (black bridge from the native splash; login fades in) ── */
#intro-overlay{position:fixed;inset:0;z-index:950;background:#000;transition:opacity .55s ease}
#intro-overlay.out{opacity:0;pointer-events:none}
.login-screen.intro-wait .login-logo-wrap,.login-screen.intro-wait .login-tagline,.login-screen.intro-wait .login-card,.login-screen.intro-wait .login-switch,.login-screen.intro-wait .login-demo-box{opacity:0;transform:translateY(12px)}
.login-logo-wrap,.login-tagline,.login-card,.login-switch,.login-demo-box{transition:opacity .5s ease,transform .5s ease}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;width:100%;max-width:360px}
.login-demo-box{background:#0a0a0a;border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;font-size:.7rem;color:var(--text4);line-height:2;margin-top:14px;width:100%;max-width:360px}
.login-demo-box strong{color:var(--text3)}
.login-switch{text-align:center;margin-top:12px;font-size:.76rem;color:var(--text4)}
.login-switch a{color:var(--red-lt);cursor:pointer;text-decoration:none}
.step-pill{display:inline-block;background:var(--red-bg);border:1px solid var(--red-dk);color:var(--red-lt);font-family:var(--fh);font-weight:700;font-size:.6rem;letter-spacing:.1em;padding:3px 10px;border-radius:20px;text-transform:uppercase;margin-bottom:14px}

/* ── FORMS ──────────────────────────────────────────── */
.fg{margin-bottom:13px}
.fl{display:block;font-size:.62rem;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;font-family:var(--fh);font-weight:700;margin-bottom:4px}
.fi{width:100%;background:#080808;border:1px solid var(--border2);border-radius:var(--r-sm);padding:10px 12px;color:var(--text);font-size:.88rem;outline:none;transition:border-color .15s;-webkit-appearance:none;transition:border-color .15s,box-shadow .15s}
.fi:focus{border-color:var(--red-dk)}
textarea.fi{resize:none;min-height:80px;line-height:1.55}
select.fi{cursor:pointer}
.fi-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chk-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#080808;border:1px solid var(--border2);border-radius:var(--r-sm);cursor:pointer;user-select:none;margin-bottom:10px}
.chk-row input[type=checkbox]{accent-color:var(--amber-lt);width:16px;height:16px;flex-shrink:0}
.chk-row label{font-size:.82rem;color:var(--text2);cursor:pointer;line-height:1.4}

/* ── BUTTONS ─────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:var(--r-sm);font-family:var(--fh);font-weight:700;font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:transform .12s cubic-bezier(.34,1.56,.64,1),filter .15s,background .15s,border-color .15s;white-space:nowrap;border:none}
.btn:active{transform:scale(.96)}
.btn:hover{filter:brightness(1.08)}
.btn-full{width:100%}
.btn-sm{padding:6px 12px;font-size:.62rem}
.btn-xs{padding:4px 9px;font-size:.58rem}
.btn-red{background:var(--red-dk);color:#ffcccc;border:1px solid #5a0000}
.btn-red:active{background:#960000}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--border2)}
.btn-ghost:active{border-color:#555;color:var(--text2)}
.btn-green{background:#134f13;color:#88ff88;border:1px solid #1e6e1e}
.btn-green.sel{background:#1a6b1a;color:#bbffbb;border-color:#2a8a2a}
.btn-danger{background:#4a0f0f;color:#ff9999;border:1px solid #7a1a1a}
.btn-danger.sel{background:#621414;color:#ffbbbb}
.btn-amber{background:#3a2200;color:var(--amber-lt);border:1px solid #6a3e00}
.btn-purple{background:#2a0f3a;color:var(--purple-lt);border:1px solid #5a1a7a}
.btn-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}

/* ── ALERTS ─────────────────────────────────────────── */
.alert{padding:10px 13px;border-radius:var(--r-sm);font-size:.78rem;margin-bottom:13px;line-height:1.5}
.alert-err{background:var(--red-bg);border:1px solid #5a0000;color:#ff9999}
.alert-ok{background:var(--green-bg);border:1px solid #1a5a1a;color:#88ff88}
.alert-info{background:rgba(26,74,138,.18);border:1px solid #1a3a7a;color:#99bbff}
.alert-warn{background:var(--amber-bg);border:1px solid #5a3800;color:var(--amber-lt)}
.alert-purple{background:var(--purple-bg);border:1px solid #5a1a7a;color:var(--purple-lt)}

/* ── CARDS ──────────────────────────────────────────── */
.card{background:var(--elev-2);border:1px solid var(--border);border-top-color:var(--border-hi);border-radius:var(--r);padding:var(--sp-4);margin-bottom:var(--sp-3);box-shadow:var(--shadow-1)}
.card-last{margin-bottom:0}
.card-hd{font-family:var(--fh);font-weight:700;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--red-lt);padding-bottom:10px;border-bottom:1px solid #200000;margin-bottom:14px}
.card-hd-amber{color:var(--amber-lt);border-bottom-color:#2a1a00}
.divider{height:1px;background:var(--border);margin:12px 0}

/* ── PILLS / TAGS ───────────────────────────────────── */
.pill{display:inline-block;padding:2px 8px;border-radius:3px;font-size:.58rem;font-family:var(--fh);font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.p-active{background:var(--green-bg);color:#66dd66;border:1px solid #1a5a1a}
.p-pending{background:var(--amber-bg);color:var(--amber-lt);border:1px solid var(--amber)}
.p-revoked{background:var(--red-bg);color:#ff7777;border:1px solid var(--red-dk)}
.p-contract{background:var(--purple-bg);color:var(--purple-lt);border:1px solid var(--purple)}
.p-yes{background:var(--green-bg);color:#66dd66;border:1px solid #1a5a1a}
.p-no{background:var(--red-bg);color:#ff7777;border:1px solid var(--red-dk)}
.p-none{background:var(--bg3);color:var(--text4);border:1px solid var(--border2)}
.tag{font-size:.55rem;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;font-family:var(--fh)}
.tag-new{background:var(--red-bg);color:#ff7777;border:1px solid var(--red-dk)}
.tag-urgent{background:var(--amber-bg);color:var(--amber-lt);border:1px solid var(--amber)}

/* ── LISTING CARDS ──────────────────────────────────── */
.lcard{background:var(--elev-2);border:1px solid var(--border);border-top-color:var(--border-hi);border-radius:var(--r);overflow:hidden;margin-bottom:var(--sp-2);box-shadow:var(--shadow-1);transition:border-color .2s,box-shadow .2s}

.lcard.open,.lcard.open-a,.lcard.open-b{box-shadow:var(--shadow-2)}
.lcard.open{border-color:#5a1414}
.lcard.open-a{border-color:#5a3600}
.lcard-head{display:flex;align-items:center;padding:13px 14px;cursor:pointer;gap:10px;user-select:none}
.lcard-ico{font-size:1.2rem;flex-shrink:0;width:28px;text-align:center}
.lcard-info{flex:1;min-width:0}
.lcard-title{font-family:var(--fh);font-weight:700;font-size:.82rem;color:var(--text);line-height:1.3}
.lcard-sub{font-size:.68rem;color:var(--text3);margin-top:2px;line-height:1.3}
.lcard-tags{display:flex;flex-direction:column;gap:3px;align-items:flex-end;flex-shrink:0}
.lchev{color:var(--text4);font-size:.55rem;margin-left:6px;transition:transform .2s;flex-shrink:0}
.lchev.op{transform:rotate(180deg);color:var(--red)}
.lbody{border-top:1px solid var(--border);padding:14px}
@keyframes fd{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
/* Detail list — vertical stacked, no grid overflow */
.detail-list{margin-bottom:12px}
.dl-item{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);gap:10px}
.dl-item:first-child{padding-top:0}
.dl-item:last-child{border-bottom:none;padding-bottom:0}
.dl-key{font-size:.62rem;letter-spacing:.1em;color:var(--text4);text-transform:uppercase;font-family:var(--fh);font-weight:700;flex-shrink:0;min-width:90px}
.dl-val{font-size:.8rem;color:var(--text2);text-align:right;line-height:1.4}
.l-desc{font-size:.8rem;color:var(--text3);line-height:1.65;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:12px}
.l-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.l-action-label{font-size:.62rem;color:var(--text4);letter-spacing:.08em;text-transform:uppercase;flex:1}

/* ── SECTION HEADERS ────────────────────────────────── */
.sec-hd{display:flex;align-items:center;gap:var(--sp-2);margin-bottom:var(--sp-3);margin-top:var(--sp-2)}
.sec-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 11px 5px 8px;border-radius:var(--r-xs);font-family:var(--fh);font-weight:700;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}
.sb-red{background:var(--red-bg);border:1px solid var(--red-dk);color:#ff7777}
.sb-amber{background:var(--amber-bg);border:1px solid var(--amber);color:var(--amber-lt)}
.sec-dot{width:5px;height:5px;border-radius:50%}
.sd-red{background:var(--red);box-shadow:0 0 4px var(--red)}
.sd-amber{background:var(--amber);box-shadow:0 0 4px var(--amber)}
.sec-rule{flex:1;height:1px;background:linear-gradient(90deg,rgba(180,10,10,.3),transparent)}
.sec-rule-a{background:linear-gradient(90deg,rgba(180,100,0,.3),transparent)}
.sb-blue{background:rgba(45,120,200,.14);border:1px solid #2d78c8;color:#7cc0ff}
.sd-blue{background:#4aa8ff;box-shadow:0 0 4px #4aa8ff}
.sec-rule-b{background:linear-gradient(90deg,rgba(45,120,200,.35),transparent)}
.lcard.open-b{border-color:#1d4d80}
/* ── CAST LISTINGS ── */
.lcard.cast{position:relative;overflow:hidden}
.lcard.cast .lcard-head{opacity:.4;pointer-events:none}
.cast-banner{position:absolute;top:50%;left:-8%;right:-8%;transform:translateY(-50%) rotate(-5deg);background:rgba(139,92,246,.94);color:#fff;font-family:var(--fh);font-weight:900;font-size:1rem;letter-spacing:.22em;text-transform:uppercase;text-align:center;padding:9px 0;z-index:5;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.55)}
.tag-cast{background:rgba(139,92,246,.16);color:#c4a8ff;border:1px solid #8b5cf6}
.sec-count{font-size:.6rem;color:var(--text4);font-family:var(--fh);font-weight:700}

/* ── STATS GRID ─────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.admin-mode .stats-grid{grid-template-columns:repeat(4,1fr)}
.stat-box{background:var(--elev-3);border:1px solid var(--border);border-top-color:var(--border-hi);border-radius:var(--r-sm);padding:var(--sp-4) var(--sp-3);box-shadow:var(--shadow-1)}
.talent-filter-btn{user-select:none}
.talent-filter-btn:hover{background:var(--bg4);border-color:var(--border2)}
.talent-filter-active{background:var(--card)!important}
%%NOOP%%{font-family:var(--fh);font-weight:900;font-size:2rem;line-height:1}
.stat-l{font-size:.58rem;letter-spacing:.1em;color:var(--text4);text-transform:uppercase;margin-top:3px;font-family:var(--fh);font-weight:600}

/* ── TALENT ROW (admin users list) ─────────────────── */
.talent-row{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;-webkit-tap-highlight-color:transparent}
.talent-row:active{border-color:var(--border2)}
.talent-avatar{width:38px;height:38px;border-radius:50%;background:#2a0000;border:1.5px solid #4a0000;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:700;font-size:.75rem;color:#ff9999;flex-shrink:0}
.talent-info{flex:1;min-width:0}
.talent-name{font-family:var(--fh);font-weight:700;font-size:.84rem;color:var(--text);margin-bottom:2px}
.talent-email{font-size:.68rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.talent-joined{font-size:.62rem;color:var(--text4);margin-top:2px}
.talent-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.talent-chevron{font-size:.55rem;color:var(--text4)}

/* ── CHIPS ──────────────────────────────────────────── */
.chip-group{margin-bottom:14px}
.chip-group-label{font-size:.62rem;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;font-family:var(--fh);font-weight:700;margin-bottom:7px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:7px 14px;border-radius:var(--r-pill);border:1px solid var(--border2);background:#080808;color:var(--text4);font-size:.72rem;cursor:pointer;transition:transform .12s cubic-bezier(.34,1.56,.64,1),background .15s,color .15s,border-color .15s;font-family:var(--fh);font-weight:600;letter-spacing:.04em;user-select:none}
.chip:active{transform:scale(.94)}
.chip:active{border-color:#555}
.chip.on{background:#380000;border-color:var(--red-dk);color:var(--red-lt)}
.chip[data-readonly]{cursor:default}

/* ── FILTER CHIPS (notification) ───────────────────── */
.fchip{padding:5px 11px;border-radius:20px;border:1px solid var(--border2);background:#080808;color:var(--text4);font-size:.68rem;cursor:pointer;transition:all .15s;font-family:var(--fh);font-weight:600;letter-spacing:.04em;display:inline-block;margin:3px 3px 3px 0;user-select:none}
.fchip.on{background:rgba(196,122,0,.18);border-color:var(--amber);color:var(--amber-lt)}

/* ── NOTIFICATION ITEMS ─────────────────────────────── */
.notif-card{background:var(--elev-2);border:1px solid var(--border);border-top-color:var(--border-hi);border-radius:var(--r);padding:var(--sp-4);margin-bottom:var(--sp-2);display:flex;gap:10px;cursor:pointer;box-shadow:var(--shadow-1);transition:border-color .15s,box-shadow .2s}
.notif-card.unread{border-left:3px solid var(--red-dk)}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:4px;box-shadow:0 0 5px var(--red)}
.notif-spacer{width:8px;flex-shrink:0}
.notif-body{flex:1;min-width:0}
.notif-title{font-family:var(--fh);font-weight:700;font-size:.78rem;color:var(--text);margin-bottom:3px}
.notif-msg{font-size:.78rem;color:var(--text2);line-height:1.5}
.notif-meta{font-size:.64rem;color:var(--text4);margin-top:4px}

/* ── PROFILE MINI PILLS ─────────────────────────────── */
.mini-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.mpill{padding:3px 9px;border-radius:20px;border:1px solid #3a0000;background:#1a0000;color:var(--red-lt);font-size:.62rem;font-family:var(--fh);font-weight:600}
.mpill-a{border-color:#3a2000;background:#1a1000;color:var(--amber-lt)}

/* ── APPLICATION CARD ───────────────────────────────── */
.app-card{background:var(--elev-2);border:1px solid var(--border);border-top-color:var(--border-hi);border-radius:var(--r);padding:var(--sp-4);margin-bottom:var(--sp-3);box-shadow:var(--shadow-1)}
.app-name{font-family:var(--fh);font-weight:700;font-size:.88rem;color:var(--text);margin-bottom:2px}
.app-meta{font-size:.7rem;color:var(--text3)}
.app-actions{display:flex;gap:7px;margin-top:12px}
.app-actions .btn{flex:1}

/* ── BOTTOM SHEET / DRAWER ──────────────────────────── */
#drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
#drawer-bg.open{opacity:1;pointer-events:all}
#drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:860px;background:var(--elev-1);border-top:1px solid var(--border-hi);border-radius:var(--r-lg) var(--r-lg) 0 0;z-index:301;transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:88vh;height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-3)}
#drawer.open{transform:translateX(-50%) translateY(0)}
.drawer-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 4px;flex-shrink:0}
.drawer-header{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-title{font-family:var(--fh);font-weight:700;font-size:.92rem;color:var(--text);line-height:1.3}
.drawer-sub{font-size:.7rem;color:var(--text3);margin-top:2px}
.drawer-close{background:var(--bg3);border:1px solid var(--border);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--text3);cursor:pointer;flex-shrink:0}
.drawer-scroll{overflow-y:auto;padding:var(--sp-4) var(--sp-4) var(--sp-6);flex:1}
#drawer::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:38px;height:4px;border-radius:var(--r-pill);background:var(--border2);z-index:2}
.drawer-footer{padding:14px 16px calc(14px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--border-hi);background:rgba(20,20,22,.92);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);flex-shrink:0}

/* ── LISTING FORM (in drawer) ───────────────────────── */
.detail-field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}

/* ── REPORT BARS ────────────────────────────────────── */
.resp-bar-wrap{margin:10px 0}
.resp-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.resp-bar-label{font-size:.68rem;color:var(--text3);width:80px;flex-shrink:0}
.resp-bar-track{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.resp-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.resp-bar-fill-green{background:linear-gradient(90deg,var(--green),#2a8a2a)}
.resp-bar-fill-red{background:linear-gradient(90deg,var(--red-dk),#aa1111)}
.resp-bar-fill-grey{background:#2a2a2a}
.resp-bar-count{font-size:.68rem;color:var(--text3);width:24px;text-align:right;flex-shrink:0}

/* ── LOG TABLE (vertical list) ──────────────────────── */
.log-item{background:var(--elev-2);border:1px solid var(--border);border-top-color:var(--border-hi);border-radius:var(--r-sm);padding:var(--sp-3);margin-bottom:var(--sp-2);box-shadow:var(--shadow-1)}
.log-title{font-family:var(--fh);font-weight:700;font-size:.78rem;color:var(--text);margin-bottom:3px}
.log-msg{font-size:.76rem;color:var(--text2);line-height:1.45;margin-bottom:5px}
.log-meta{font-size:.64rem;color:var(--text4);display:flex;gap:8px;flex-wrap:wrap}
.log-chip{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:1px 6px}

/* ── ON CONTRACT BANNER ─────────────────────────────── */
.contract-banner{background:var(--purple-bg);border:1px solid var(--purple);border-radius:var(--r-sm);padding:10px 13px;font-size:.76rem;color:var(--purple-lt);margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}

/* ── EMPTY STATE ────────────────────────────────────── */
.empty-state{text-align:center;padding:56px 24px;color:var(--text3)}
.empty-icon{display:inline-flex;align-items:center;justify-content:center;width:76px;height:76px;margin:0 auto 16px;border-radius:var(--r-pill);background:radial-gradient(circle at 50% 35%,rgba(122,0,0,.22),rgba(122,0,0,.06));border:1px solid var(--border-hi);color:var(--red-lt)}
.empty-icon .ic{width:32px;height:32px}
.empty-txt{font-size:.82rem;line-height:1.6;max-width:280px;margin:0 auto}
.empty-txt{font-size:.82rem;line-height:1.6}

/* ── PROFILE PICTURE ─────────────────────────────────── */
.profile-pic-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:18px;gap:10px}
.profile-pic{width:90px;height:90px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);background:var(--bg3)}
.profile-pic-placeholder{width:90px;height:90px;border-radius:50%;background:#1e0000;border:2px solid #3a0000;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:900;font-size:1.6rem;color:#ff9999;flex-shrink:0}
.profile-pic-label{font-size:.64rem;color:var(--text3);text-align:center;letter-spacing:.05em}
.pic-upload-btn{background:var(--bg3);border:1px dashed var(--border2);color:var(--text3);padding:6px 14px;border-radius:20px;font-size:.7rem;cursor:pointer;transition:all .15s}
.pic-upload-btn:hover{border-color:var(--border3);color:var(--text2)}
.pic-input{display:none}

/* ── NOTIF DELETE ────────────────────────────────────── */
.notif-card{position:relative}
.notif-del-btn{background:transparent;border:none;font-size:1rem;cursor:pointer;padding:4px;color:var(--text4);flex-shrink:0;transition:color .15s;align-self:flex-start;margin-top:-2px}
.notif-del-btn:hover{color:#ff7777}

/* ── CONFIRM OVERLAY (small inline modal) ────────────── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;display:flex;align-items:center;justify-content:center;padding:24px}
.confirm-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:24px;width:100%;max-width:320px;text-align:center}
.confirm-q{font-family:var(--fh);font-weight:700;font-size:.92rem;color:var(--text);margin-bottom:8px}
.confirm-sub{font-size:.78rem;color:var(--text3);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px;justify-content:center}
.confirm-btns .btn{flex:1;font-size:.8rem;padding:10px 14px}

/* ── CONTRACT DATE FORM ──────────────────────────────── */
.contract-date-form{padding:4px 0}
.contract-date-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.contract-current{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;font-size:.76rem;color:var(--amber-lt);margin-bottom:12px;line-height:1.6}

/* ── DRAWER TALENT AVATAR (larger in drawer) ─────────── */
.drawer-talent-avatar{width:56px;height:56px;border-radius:50%;background:#2a0000;border:2px solid #4a0000;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:900;font-size:1.1rem;color:#ff9999;flex-shrink:0;overflow:hidden}
.drawer-talent-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* ── VIEW TOGGLE (dual-role talent/admin) ────────────── */
/* Single icon button — fades between 🏛 and ⭐ */
.vt-icon-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border2);background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-size:1.05rem;cursor:pointer;transition:border-color .2s,background .2s;flex-shrink:0;position:relative;overflow:hidden}
.vt-icon-btn:hover{border-color:var(--border3);background:#111}
.vt-icon-btn.mode-admin{border-color:#5a0000;background:#1a0000}
.vt-icon-btn.mode-talent{border-color:#4a4000;background:#1a1800}
.vt-icon-inner{transition:opacity .18s ease,transform .18s ease;display:block;line-height:1}
.vt-icon-btn .vt-tooltip{position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--border2);border-radius:4px;font-size:.58rem;color:var(--text3);padding:2px 6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s}
.vt-icon-btn:hover .vt-tooltip{opacity:1}

/* ── FADE TRANSITION ─────────────────────────────────── */
#content{transition:opacity .18s ease}
#content.fade-out{opacity:0}
#content.fade-in{opacity:1}

/* ── PROMOTE BUTTON in profile drawer ───────────────── */
.btn-promote{background:#1a1a0a;color:#ffe066;border:1px solid #4a4a00;font-size:.62rem}
.btn-promote:hover{background:#2a2a0a;border-color:#6a6a00}
.btn-demote{background:#1a0a1a;color:var(--purple-lt);border:1px solid #3a0a3a;font-size:.62rem}
.btn-demote:hover{background:#2a1a2a}

/* ── LISTING VISIBILITY SELECTOR ────────────────────── */
.vis-section{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;margin-bottom:12px}
.vis-opts{display:flex;gap:8px;margin-bottom:0}
.vis-opt{flex:1;display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:var(--r-sm);border:1px solid var(--border2);cursor:pointer;transition:all .15s;user-select:none;background:#080808}
.vis-opt.selected{border-color:var(--amber);background:rgba(196,122,0,.1)}
.vis-opt input[type=checkbox]{accent-color:var(--amber-lt);width:14px;height:14px;flex-shrink:0;pointer-events:none}
.vis-opt label{font-size:.72rem;color:var(--text3);cursor:pointer;font-family:var(--fh);font-weight:600;pointer-events:none}
.vis-opt.selected label{color:var(--amber-lt)}
.talent-search-wrap{margin-top:10px}
.talent-search-results{background:#080808;border:1px solid var(--border2);border-radius:var(--r-sm);margin-top:4px;max-height:140px;overflow-y:auto}
.talent-search-item{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;transition:background .12s}
.talent-search-item:hover{background:var(--bg3)}
.selected-talent-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.sel-talent-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px 3px 10px;background:rgba(196,122,0,.15);border:1px solid var(--amber);border-radius:20px;font-size:.68rem;color:var(--amber-lt);font-family:var(--fh);font-weight:600}
.sel-talent-chip button{background:none;border:none;color:var(--amber-lt);font-size:.75rem;cursor:pointer;padding:0;line-height:1;opacity:.7}
.sel-talent-chip button:hover{opacity:1}

/* ── CALENDAR TAB ────────────────────────────────────── */
.cal-event{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.cal-event:hover{border-color:var(--border2)}
.cal-event-date-bar{background:linear-gradient(135deg,#1a0000,#2a0800);padding:12px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border)}
.cal-date-big{font-family:var(--fh);font-weight:900;font-size:2.2rem;color:var(--red-lt);line-height:1;flex-shrink:0}
.cal-date-info{flex:1}
.cal-day-name{font-family:var(--fh);font-weight:700;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--amber-lt)}
.cal-month-year{font-size:.75rem;color:var(--text3);margin-top:1px}
.cal-time-badge{background:#2a0000;border:1px solid #5a0000;border-radius:4px;padding:4px 10px;font-family:var(--fh);font-weight:700;font-size:.7rem;color:var(--red-lt);white-space:nowrap}
.cal-event-body{padding:13px 16px}
.cal-expand-btn{display:block;width:100%;margin-top:10px;background:none;border:none;border-top:1px solid var(--border);color:var(--text3);font-size:.72rem;padding:9px 0 2px;cursor:pointer;font-family:var(--fh);font-weight:700;letter-spacing:.06em}
.cal-expand-btn:active{color:var(--red-lt)}
.res-block{margin-top:12px;padding:11px 12px;background:#151515;border:1px solid var(--border2);border-radius:9px}
.res-title{font-family:var(--fh);font-weight:700;font-size:.74rem;color:var(--text);margin-bottom:8px}
.res-chip{padding:9px 12px;border:1px solid var(--border2);border-radius:8px;font-size:.76rem;color:var(--text2);margin-top:6px;cursor:pointer;text-align:center;background:#0f0f0f}
.res-chip.on{border-color:var(--red-dk);background:rgba(122,0,0,.18);color:var(--red-lt);font-weight:700}
.res-note{font-size:.64rem;color:var(--text4);margin-top:7px;text-align:center}
.log-sec-hd{user-select:none;margin-top:14px}
.log-bubble{background:#c62828;color:#fff;border-radius:10px;font-size:.6rem;font-weight:700;padding:2px 8px;margin-left:7px;flex-shrink:0}
.log-sec-arrow{color:var(--text4);font-size:.8rem;margin-left:8px;flex-shrink:0}
.subtab-bar{display:flex;gap:6px;padding:2px 0 14px;position:sticky;top:0;z-index:6}
.subtab{flex:1;padding:10px 6px;border-radius:var(--r-sm);border:1px solid var(--border2);background:#111;color:var(--text3);font-family:var(--fh);font-weight:700;font-size:.7rem;position:relative;cursor:pointer;transition:transform .12s cubic-bezier(.34,1.56,.64,1),background .15s,color .15s,border-color .15s}
.subtab:active{transform:scale(.96)}
.subtab.active{background:var(--red-dk);border-color:var(--red);color:#fff;box-shadow:0 2px 10px rgba(122,0,0,.4)}
.subtab-badge{background:#c62828;color:#fff;border-radius:9px;font-size:.56rem;padding:1px 6px;margin-left:5px}
.sec-controls{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 4px 10px;margin-bottom:4px}
.sec-ctl-btn{background:none;border:1px solid #5a0000;color:#ff7777;border-radius:7px;font-size:.66rem;padding:5px 10px;cursor:pointer;font-family:var(--fh);font-weight:600}
.push-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.push-toggle-lbl{font-size:.66rem;color:var(--text3);font-family:var(--fh);font-weight:600}
.push-toggle input{display:none}
.push-slider{width:36px;height:20px;background:#3a3a3a;border-radius:20px;position:relative;transition:background .2s}
.push-slider::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.push-toggle input:checked + .push-slider{background:var(--red-dk)}
.push-toggle input:checked + .push-slider::after{transform:translateX(16px)}
.mgmt-card.is-cast .mgmt-card-inner{opacity:.4;pointer-events:none}
.cast-strip{position:absolute;top:38%;left:-6%;right:-6%;transform:translateY(-50%) rotate(-4deg);background:rgba(139,92,246,.95);color:#fff;font-family:var(--fh);font-weight:900;font-size:.92rem;letter-spacing:.2em;text-align:center;padding:7px 0;z-index:3;pointer-events:none;box-shadow:0 4px 18px rgba(0,0,0,.5)}
.cal-event-title{font-family:var(--fh);font-weight:700;font-size:.86rem;color:var(--text);margin-bottom:3px}
.cal-event-sub{font-size:.72rem;color:var(--text3)}
.cal-reminder-pill{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:rgba(196,122,0,.12);border:1px solid var(--amber);border-radius:20px;padding:3px 10px;font-size:.64rem;color:var(--amber-lt);font-family:var(--fh);font-weight:600}
/* Admin calendar */
.admin-cal-event{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.admin-cal-head{background:linear-gradient(135deg,#1a0000,#280a00);padding:10px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.admin-cal-date{font-family:var(--fh);font-weight:900;font-size:1.5rem;color:var(--red-lt);line-height:1;flex-shrink:0;min-width:40px}
.admin-cal-info{flex:1}
.admin-cal-title{font-family:var(--fh);font-weight:700;font-size:.82rem;color:var(--text)}
.admin-cal-sub{font-size:.68rem;color:var(--text3);margin-top:2px}
.admin-cal-body{padding:11px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.confirmed-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:#1a0000;border:1px solid #3a0000;border-radius:20px;font-size:.64rem;color:var(--red-lt);font-family:var(--fh);font-weight:600}

/* ── TALENT RESPONSE BUTTONS (enlarged for talent view) ── */
.resp-btn-large{display:flex;align-items:center;justify-content:center;gap:7px;padding:14px 6px;border-radius:var(--r-sm);font-family:var(--fh);font-weight:700;font-size:.76rem;letter-spacing:.02em;text-transform:uppercase;white-space:nowrap;cursor:pointer;transition:transform .12s cubic-bezier(.34,1.56,.64,1),background .2s,border-color .2s;border:2px solid transparent;flex:1}
.resp-btn-large{gap:7px}
.resp-btn-large .ic{color:currentColor;flex-shrink:0;vertical-align:middle}
.resp-btn-large:active{transform:scale(.97)}
.resp-btn-yes{background:#0d2e0d;color:#55cc55;border-color:#1a5a1a}
.resp-btn-yes:hover{background:#133513;border-color:#2a7a2a}
.resp-btn-yes.sel{background:#1a6b1a;color:#ccffcc;border-color:#3acc3a;box-shadow:0 0 16px rgba(0,180,0,.25)}
.resp-btn-no{background:#2e0d0d;color:#cc5555;border-color:#5a1a1a}
.resp-btn-no:hover{background:#3a1010;border-color:#7a2a2a}
.resp-btn-no.sel{background:#7a1414;color:#ffcccc;border-color:#cc2222;box-shadow:0 0 16px rgba(200,0,0,.25)}

/* ── EMAIL MODAL ──────────────────────────────────────── */
.email-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeInOverlay .2s ease}
@keyframes fadeInOverlay{from{opacity:0}to{opacity:1}}
.email-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;animation:slideUpModal .22s ease}
@keyframes slideUpModal{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.email-modal-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.email-modal-title{font-family:var(--fh);font-weight:700;font-size:.88rem;color:var(--text)}
.email-modal-scroll{flex:1;overflow-y:auto;padding:16px}
.email-modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.email-to-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:8px 10px;background:#080808;border:1px solid var(--border2);border-radius:var(--r-sm);min-height:42px;margin-bottom:10px;cursor:text}
.email-recip-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px 3px 10px;background:rgba(196,122,0,.15);border:1px solid var(--amber);border-radius:20px;font-size:.68rem;color:var(--amber-lt);font-family:var(--fh);font-weight:600}
.email-recip-chip button{background:none;border:none;color:var(--amber-lt);font-size:.75rem;cursor:pointer;padding:0;line-height:1;opacity:.7}
.email-recip-chip button:hover{opacity:1}
.email-search-drop{background:#080808;border:1px solid var(--border2);border-radius:var(--r-sm);margin-top:4px;max-height:120px;overflow-y:auto}
.email-search-item{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;transition:background .12s}
.email-search-item:hover{background:var(--bg3)}

/* ── ADMIN PROFILE MODAL ─────────────────────────────── */
.admin-profile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeInOverlay .18s ease}
.admin-profile-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:380px;overflow:hidden;animation:slideUpModal .2s ease}
.admin-profile-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.admin-profile-header-title{font-family:var(--fh);font-weight:700;font-size:.86rem;color:var(--text)}
.admin-profile-body{padding:18px 16px}
.admin-profile-pic-row{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:18px}
.admin-profile-avatar{width:76px;height:76px;border-radius:50%;object-fit:cover;border:2px solid var(--border2)}
.admin-profile-avatar-placeholder{width:76px;height:76px;border-radius:50%;background:#1e0000;border:2px solid #3a0000;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:900;font-size:1.5rem;color:#ff9999}
.admin-profile-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}

/* ── CHANGE PASSWORD MODAL ───────────────────────────── */
.chpw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:700;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeInOverlay .18s ease}
.chpw-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:340px;animation:slideUpModal .2s ease}
.chpw-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.chpw-title{font-family:var(--fh);font-weight:700;font-size:.86rem;color:var(--text)}
.chpw-body{padding:18px 16px}
.chpw-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}

/* ── DATE PICKER POPUP ───────────────────────────────── */
.dp-pop{position:fixed;z-index:900;background:#161616;border:1px solid var(--border2);border-radius:var(--r);box-shadow:0 12px 40px rgba(0,0,0,.65);width:274px;padding:12px;animation:fadeInOverlay .12s ease}
.dp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:6px}
.dp-title{font-family:var(--fh);font-weight:700;font-size:.78rem;color:var(--text);flex:1;text-align:center}
.dp-nav{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:1rem;background:#0e0e0e;border:1px solid var(--border2);flex-shrink:0}
.dp-nav:active{color:var(--red-lt);border-color:var(--red-dk)}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dp-dow{text-align:center;font-family:var(--fh);font-weight:700;font-size:.52rem;letter-spacing:.05em;color:var(--text4);padding:4px 0;text-transform:uppercase}
.dp-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:.78rem;color:var(--text2);cursor:pointer;border:1px solid transparent;user-select:none}
.dp-day:hover{background:#242424}
.dp-day.blank{cursor:default;background:none}
.dp-day.today{border-color:var(--red-dk);color:var(--red-lt)}
.dp-day.sel{background:var(--red-dk);color:#ffcccc;font-weight:700}
.dp-foot{display:flex;gap:8px;margin-top:10px}

/* ── FORGOT PASSWORD MODAL ───────────────────────────── */
.fpw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:700;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeInOverlay .18s ease}
.fpw-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:340px;animation:slideUpModal .22s ease;overflow:hidden}
.fpw-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.fpw-title{font-family:var(--fh);font-weight:700;font-size:.86rem;color:var(--text)}
.fpw-body{padding:18px 16px}
.fpw-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.fpw-step-pill{display:inline-block;background:var(--red-bg);border:1px solid var(--red-dk);color:var(--red-lt);font-family:var(--fh);font-weight:700;font-size:.58rem;letter-spacing:.1em;padding:3px 9px;border-radius:20px;text-transform:uppercase;margin-bottom:12px}
.fpw-code-display{background:#0a0a0a;border:1px solid var(--amber);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:14px;text-align:center}
.fpw-code-num{font-family:var(--fh);font-weight:900;font-size:2rem;letter-spacing:.3em;color:var(--amber-lt);line-height:1}
.fpw-code-note{font-size:.66rem;color:var(--text3);margin-top:5px;line-height:1.5}
.fpw-resend{font-size:.7rem;color:var(--red-lt);cursor:pointer;text-align:center;display:block;margin-top:8px}
.fpw-resend:hover{color:#fff}
</style>

function fbErrMsg(err){
  const c=(err&&err.code)||'';
  if(c==='auth/invalid-credential'||c==='auth/wrong-password'||c==='auth/user-not-found')return'Email or password is incorrect.';
  if(c==='auth/email-already-in-use')return'An account with that email already exists.';
  if(c==='auth/invalid-email')return'Enter a valid email address.';
  if(c==='auth/weak-password')return'Password must be at least 6 characters.';
  if(c==='auth/too-many-requests')return'Too many attempts. Please wait a moment and try again.';
  if(c==='auth/network-request-failed')return'No internet connection. Please try again.';
  console.error(err);
  return'Something went wrong. Please try again.';
}

/* Users live in Firestore. DB.users is a live local mirror:
   - onSnapshot keeps the mirror fresh (and re-renders on remote changes)
   - dbSave() diffs the mirror and pushes any locally-changed user docs */
let _usersUnsub=null;
let _cloudUsers={};   // last-known cloud JSON per email, for diffing
let _usersReady=false;  // no pushes until the first cloud snapshot has landed
let _cloudSchema='{}';
let _registering=false;  // suppresses the session-restore listener during sign-up

function attachUsersListener(){
  if(!FB_OK||_usersUnsub)return;
  _usersUnsub=FS.collection('users').onSnapshot(snap=>{
    const fresh={};
    snap.forEach(d=>{fresh[d.id]=d.data();_cloudUsers[d.id]=JSON.stringify(d.data());});
    Object.keys(_cloudUsers).forEach(k=>{if(!fresh[k])delete _cloudUsers[k];});
    DB.users=fresh;
    if(S.user){
      const me=DB.users[S.user.email];
      if(!me||me.status==='revoked'){AUTH.signOut();return;}
      S.user=me;
    }
    _usersReady=true;
    if(snap.docChanges().some(c=>!c.doc.metadata.hasPendingWrites))scheduleRender();
  },err=>{console.error('users listener',err);scheduleReattach();});
}

/* Shared collections: listings, notifications, events (arrays keyed by item.id)
   and responses (a map per listing). Same mirror pattern as users:
   onSnapshot keeps DB fresh; dbSave() diffs and pushes local changes. */
const CLOUD_ARRAYS=['listings','notifications','events'];
let _cloudDocs={listings:{},notifications:{},events:{},responses:{},results:{}};
let _cloudReady={listings:false,notifications:false,events:false,responses:false,results:false};
let _unsubs=[];
const _idNum=id=>parseInt(String(id).replace(/\D/g,''),10)||0;

let _renderQueued=false;
function scheduleRender(){
  if(_renderQueued)return;_renderQueued=true;
  requestAnimationFrame(()=>{_renderQueued=false;render();});
}

function syncArrayToCloud(name){
  if(!FB_OK||!AUTH.currentUser||!_cloudReady[name])return;
  const ids={};
  (DB[name]||[]).forEach(item=>{
    if(!item||!item.id)return;
    ids[item.id]=true;
    const j=JSON.stringify(item);
    if(_cloudDocs[name][item.id]!==j){
      _cloudDocs[name][item.id]=j;
      FS.collection(name).doc(String(item.id)).set(JSON.parse(j)).catch(e=>console.error('sync',name,item.id,e));
    }
  });
  Object.keys(_cloudDocs[name]).forEach(id=>{
    if(!ids[id]){
      delete _cloudDocs[name][id];
      FS.collection(name).doc(id).delete().catch(e=>console.error('delete',name,id,e));
    }
  });
}

function syncSchemaToCloud(){
  if(!FB_OK||!AUTH.currentUser)return;
  const j=JSON.stringify(DB.schema||{});
  if(j===_cloudSchema)return;
  _cloudSchema=j;
  FS.collection('config').doc('schema').set(DB.schema||{}).catch(e=>console.error('sync schema',e));
}
function syncMapCollection(colName){
  if(!FB_OK||!AUTH.currentUser||!_cloudReady[colName])return;
  const store=DB[colName]||{};const ids={};
  Object.keys(store).forEach(id=>{
    ids[id]=true;
    const cur=store[id]||{};
    const j=JSON.stringify(cur);
    if(_cloudDocs[colName][id]===j)return;
    const prev=_cloudDocs[colName][id]?JSON.parse(_cloudDocs[colName][id]):{};
    const patch={};let dirty=false;
    Object.keys(cur).forEach(k=>{if(JSON.stringify(cur[k])!==JSON.stringify(prev[k])){patch[k]=cur[k];dirty=true;}});
    Object.keys(prev).forEach(k=>{if(!(k in cur)){patch[k]=firebase.firestore.FieldValue.delete();dirty=true;}});
    _cloudDocs[colName][id]=j;
    if(dirty)FS.collection(colName).doc(id).set(patch,{merge:true}).catch(e=>console.error('sync',colName,id,e));
  });
  Object.keys(_cloudDocs[colName]).forEach(id=>{
    if(!ids[id]){
      delete _cloudDocs[colName][id];
      FS.collection(colName).doc(id).delete().catch(e=>console.error('delete',colName,id,e));
    }
  });
}
function syncResponsesToCloud(){
  if(!FB_OK||!AUTH.currentUser||!_cloudReady.responses)return;
  const lids={};
  Object.keys(DB.responses||{}).forEach(lid=>{
    lids[lid]=true;
    const j=JSON.stringify(DB.responses[lid]);
    if(_cloudDocs.responses[lid]!==j){
      // Merge-write only the changed keys so two talent responding at the
      // same moment can never overwrite each other's answers.
      const before=_cloudDocs.responses[lid]?JSON.parse(_cloudDocs.responses[lid]):{};
      const now=JSON.parse(j);
      const payload={};
      Object.keys(now).forEach(k=>{if(JSON.stringify(now[k])!==JSON.stringify(before[k]))payload[k]=now[k];});
      Object.keys(before).forEach(k=>{if(!(k in now))payload[k]=firebase.firestore.FieldValue.delete();});
      _cloudDocs.responses[lid]=j;
      if(Object.keys(payload).length)
        FS.collection('responses').doc(lid).set(payload,{merge:true}).catch(e=>console.error('sync responses',lid,e));
    }
  });
  Object.keys(_cloudDocs.responses).forEach(lid=>{
    if(!lids[lid]){
      delete _cloudDocs.responses[lid];
      FS.collection('responses').doc(lid).delete().catch(e=>console.error('delete responses',lid,e));
    }
  });
}

/* If any listener dies (network blip, backgrounded app, token refresh),
   re-attach everything after a short delay so no device is ever left stale. */
let _reattachTimer=null;
function scheduleReattach(){
  if(_reattachTimer)return;
  _reattachTimer=setTimeout(()=>{
    _reattachTimer=null;
    if(FB_OK&&AUTH.currentUser)refreshCloud();
  },3000);
}
function refreshCloud(){
  if(!FB_OK||!AUTH.currentUser)return;
  if(_usersUnsub){try{_usersUnsub();}catch(e){}_usersUnsub=null;}
  _cloudUsers={};_usersReady=false;
  detachCloudListeners();
  attachCloudListeners();
}
/* Returning to the app after it was backgrounded: force a fresh server pull */
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&FB_OK&&AUTH.currentUser)refreshCloud();
});
window.addEventListener('online',()=>{if(FB_OK&&AUTH.currentUser)scheduleReattach();});

function attachCloudListeners(){
  attachUsersListener();
  if(_unsubs.length)return;
  CLOUD_ARRAYS.forEach(name=>{
    _unsubs.push(FS.collection(name).onSnapshot(snap=>{
      const docs={};const arr=[];
      snap.forEach(d=>{docs[d.id]=JSON.stringify(d.data());arr.push(d.data());});
      arr.sort((a,b)=>_idNum(a.id)-_idNum(b.id));   // restore chronological order
      _cloudDocs[name]=docs;_cloudReady[name]=true;
      DB[name]=arr;
      if(snap.docChanges().some(c=>!c.doc.metadata.hasPendingWrites))scheduleRender();
    },err=>{console.error(name+' listener',err);scheduleReattach();}));
  });
  _unsubs.push(FS.collection('config').doc('schema').onSnapshot(doc=>{
    DB.schema=doc.exists?(doc.data()||{}):{};
    _cloudSchema=JSON.stringify(DB.schema);
    _lastSnapAt=Date.now();
    scheduleRender();
  },err=>{console.error('schema listener',err);scheduleReattach();}));
  _unsubs.push(FS.collection('results').onSnapshot(snap=>{
    const docs={};const map={};
    snap.forEach(d=>{docs[d.id]=JSON.stringify(d.data());map[d.id]=d.data();});
    _cloudDocs.results=docs;_cloudReady.results=true;
    DB.results=map;
    _lastSnapAt=Date.now();
    scheduleRender();
  },err=>{console.error('results listener',err);scheduleReattach();}));
  _unsubs.push(FS.collection('responses').onSnapshot(snap=>{
    const docs={};const map={};
    snap.forEach(d=>{docs[d.id]=JSON.stringify(d.data());map[d.id]=d.data();});
    _cloudDocs.responses=docs;_cloudReady.responses=true;
    DB.responses=map;
    if(snap.docChanges().some(c=>!c.doc.metadata.hasPendingWrites))scheduleRender();
  },err=>{console.error('responses listener',err);scheduleReattach();}));
}

/* Returns PS with cloud customisations merged in: DB.schema[key]={add:[...],remove:[...]} */
function schemaFor(){
  const custom=(DB.schema)||{};
  return PS.map(s=>{
    const c=custom[s.key];
    if(!c)return s;
    let opts=s.opts.slice();
    (c.remove||[]).forEach(r=>{opts=opts.filter(o=>o!==r);});
    (c.add||[]).forEach(a=>{if(!opts.includes(a))opts.push(a);});
    return {...s,opts};
  });
}

/* AU date input helpers: display DD/MM/YYYY, store ISO (YYYY-MM-DD) */
function isoToAu(iso){if(!iso)return'';const p=String(iso).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:'';}
function auToIso(au){
  const m=(au||'').trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(!m)return null;
  const d=+m[1],mo=+m[2],y=+m[3];const dt=new Date(y,mo-1,d);
  if(dt.getFullYear()!==y||dt.getMonth()!==mo-1||dt.getDate()!==d)return null; // rejects e.g. 31/02
  return`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
/* Tap-to-pick AU calendar popup. Field becomes read-only; tapping opens a
   DD/MM/YYYY calendar. Value is always displayed DD/MM/YYYY, stored ISO via auToIso. */
let _dpEl=null,_dpCleanup=null;
function closeDatePicker(){
  if(_dpEl){_dpEl.remove();_dpEl=null;}
  if(_dpCleanup){_dpCleanup();_dpCleanup=null;}
}
function attachAuDatePicker(inp){
  if(!inp||inp._dpBound)return;inp._dpBound=true;
  inp.readOnly=true;inp.style.cursor='pointer';
  inp.addEventListener('click',()=>openDatePicker(inp));
}
function openDatePicker(inp){
  closeDatePicker();
  const iso=auToIso(inp.value);
  const sel=iso?new Date(iso+'T00:00'):null;
  const base=sel||new Date();
  let vy=base.getFullYear(),vm=base.getMonth();
  _dpEl=document.createElement('div');_dpEl.className='dp-pop';
  document.body.appendChild(_dpEl);
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const position=()=>{
    const r=inp.getBoundingClientRect(),pw=_dpEl.offsetWidth,ph=_dpEl.offsetHeight;
    let left=Math.min(Math.max(8,r.left),window.innerWidth-pw-8);
    let top=r.bottom+6;
    if(top+ph>window.innerHeight-8)top=Math.max(8,r.top-ph-6);
    _dpEl.style.left=left+'px';_dpEl.style.top=top+'px';
  };
  const draw=()=>{
    const today=new Date();
    const off=(new Date(vy,vm,1).getDay()+6)%7; // Monday-first
    const dim=new Date(vy,vm+1,0).getDate();
    let cells='';
    ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d=>cells+=`<div class="dp-dow">${d}</div>`);
    for(let i=0;i<off;i++)cells+='<div class="dp-day blank"></div>';
    for(let d=1;d<=dim;d++){
      const isToday=today.getFullYear()===vy&&today.getMonth()===vm&&today.getDate()===d;
      const isSel=sel&&sel.getFullYear()===vy&&sel.getMonth()===vm&&sel.getDate()===d;
      cells+=`<div class="dp-day${isToday?' today':''}${isSel?' sel':''}" data-dp-day="${d}">${d}</div>`;
    }
    _dpEl.innerHTML=`
      <div class="dp-head">
        <button class="dp-nav" data-dp-prev>‹</button>
        <div class="dp-title">${months[vm]} ${vy}</div>
        <button class="dp-nav" data-dp-next>›</button>
      </div>
      <div class="dp-grid">${cells}</div>
      <div class="dp-foot">
        <button class="btn btn-ghost btn-xs" data-dp-clear style="flex:1">Clear</button>
        <button class="btn btn-red btn-xs" data-dp-today style="flex:1">Today</button>
      </div>`;
    _dpEl.querySelector('[data-dp-prev]').onclick=e=>{e.stopPropagation();vm--;if(vm<0){vm=11;vy--;}draw();};
    _dpEl.querySelector('[data-dp-next]').onclick=e=>{e.stopPropagation();vm++;if(vm>11){vm=0;vy++;}draw();};
    _dpEl.querySelector('[data-dp-clear]').onclick=()=>{inp.value='';closeDatePicker();};
    _dpEl.querySelector('[data-dp-today]').onclick=()=>{inp.value=dStr(new Date());closeDatePicker();};
    _dpEl.querySelectorAll('[data-dp-day]').forEach(el=>el.onclick=()=>{
      inp.value=dStr(new Date(vy,vm,+el.dataset.dpDay));closeDatePicker();
    });
    position();
  };
  draw();
  // Close on outside tap or scroll (deferred so the opening tap doesn't close it)
  const onOutside=e=>{if(_dpEl&&!_dpEl.contains(e.target)&&e.target!==inp)closeDatePicker();};
  const onScroll=e=>{if(_dpEl&&!_dpEl.contains(e.target))closeDatePicker();};
  setTimeout(()=>{
    document.addEventListener('pointerdown',onOutside,true);
    document.addEventListener('scroll',onScroll,true);
  },0);
  _dpCleanup=()=>{
    document.removeEventListener('pointerdown',onOutside,true);
    document.removeEventListener('scroll',onScroll,true);
  };
}

function downscaleImage(file,maxDim,cb){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      let{width:w,height:h}=img;
      if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
      else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      try{cb(c.toDataURL('image/jpeg',0.82));}catch(err){cb(ev.target.result);}
    };
    img.onerror=()=>cb(ev.target.result);
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function gcalUrl(ev){

  });

function purgeOldEvents(){
  if(!Array.isArray(DB.events))DB.events=[];
  const before=DB.events.length;
  DB.events=DB.events.filter(e=>{
    if(!e)return false;
    const endT=new Date(e.endISO||e.startISO||0).getTime();
    if(!endT)return true;
    // Auditions stay a week after ending so talent can submit results; others 24h
    const evType=e.type||((DB.listings.find(l=>l.id===e.listingId)||{}).type);
    const keepMs=(evType==='Audition'?7*24:24)*3600*1000;
    return endT+keepMs>Date.now();
  });

}
function checkResultReminders(){
  if(!Array.isArray(DB.events))DB.events=[];
  let changed=false;
  for(const ev of DB.events){
    if(ev.resultReminderSent)continue;
    const evType=ev.type||((DB.listings.find(l=>l.id===ev.listingId)||{}).type);
    if(evType!=='Audition')continue;
    const endT=new Date(ev.endISO||ev.startISO||0).getTime();
    if(!endT)continue;
    if(Date.now()>endT+24*3600*1000){
      // Remind only the confirmed talent who haven't submitted a result yet
      const pending=(ev.confirmedEmails||[]).filter(em=>!((DB.results[ev.id]||{})[em]));
      if(pending.length){
        DB.notifications.push({
          id:'resr_'+ev.id,
          title:'Reminder: submit your audition result',
          msg:'How did "'+ev.title+'" go? Open your calendar, expand the event and submit your result.',
          sentAt:nowStr(),sentBy:'Dargie Agency',
          filterDesc:'Result reminder',category:'reminder',
          targets:pending,
          eventId:ev.id,
        });

      ev.resultReminderSent=true;
      changed=true;
    }
  }
  if(changed)dbSave();
}

        <div class="tn-avatar" id="btn-admin-profile" style="cursor:pointer;${showingAdmin?'':'display:none'}">${u.profilePic?`<img src="${u.profilePic}" style="width:30px;height:30px;border-radius:50%;object-fit:cover" alt=""/>`:inits(u.name)}</div>
        <div class="tn-avatar" style="${!showingAdmin?'':'display:none'}">${u.profilePic?`<img src="${u.profilePic}" style="width:30px;height:30px;border-radius:50%;object-fit:cover" alt=""/>`:inits(u.name)}</div>
        <button class="tn-signout" id="btn-signout">Sign out</button>
      </div>`;

    $('btn-signout').onclick=()=>{if(FB_OK)AUTH.signOut();S.user=null;S.view='login';S.openListings={};S.resetScrollOnRender=true;$('shell').classList.remove('admin-mode');closeDrawer();render();};
    const adminProfBtn=$('btn-admin-profile');
    if(adminProfBtn)adminProfBtn.onclick=()=>showAdminProfileModal();

    // Single toggle button: fade the icon out, swap state, fade in
    const vtBtn=$('vt-toggle');
    if(vtBtn){
      vtBtn.onclick=()=>{
        const iconEl=$('vt-icon');
        if(iconEl){iconEl.style.opacity='0';iconEl.style.transform='scale(.6)';}
        setTimeout(()=>{
          if(S.viewMode==='admin'){S.viewMode='talent';S.view='board';}
          else{S.viewMode='admin';S.view='admin';S.adminTab='applications';}
          S.resetScrollOnRender=true;
          fadeRender();
        },160);
      };
    }

    if(showingTalent&&!showingAdmin){
      // Pure talent portal
      adminNav.classList.add('hidden');
      botNav.classList.remove('hidden');
      $('shell').classList.remove('admin-mode');
      botNav.innerHTML=`
        <button class="bnav-btn ${S.view==='board'?'active':''}" data-bv="board">
          <span class="bnav-icon">${ic("clipboard",22)}</span><span class="bnav-label">Board</span>
        </button>
        <button class="bnav-btn ${S.view==='calendar'?'active':''}" data-bv="calendar">
          <span class="bnav-icon">${ic("calendar",22)}</span><span class="bnav-label">Calendar</span>
        </button>
        <button class="bnav-btn ${S.view==='inbox'?'active':''}" data-bv="inbox">
          <span class="bnav-icon">${ic("bell",22)}</span><span class="bnav-label">Alerts</span>
          ${unread>0?`<span class="bnav-badge">${unread}</span>`:''}
        </button>
        <button class="bnav-btn ${S.view==='profile'?'active':''}" data-bv="profile">
          <span class="bnav-icon">${ic("user",22)}</span><span class="bnav-label">Profile</span>
        </button>`;
      botNav.querySelectorAll('[data-bv]').forEach(el=>el.addEventListener('click',()=>{
        S.view=el.dataset.bv;S.editingProfile=false;S.resetScrollOnRender=true;closeDrawer();render();
      }));
    } else {
      // Admin portal — bottom nav, 4 tabs, mirrors the talent layout
      adminNav.classList.add('hidden');
      botNav.classList.remove('hidden');
      $('shell').classList.remove('admin-mode');
      // Talent tab owns Applications/Talent/Send Notification sub-tabs
      const talentActive=S.view==='admin'&&['applications','users','notify'].includes(S.adminTab);
      const listingsActive=S.view==='admin'&&S.adminTab==='listings';
      const calActive=S.view==='admin'&&S.adminTab==='calendar';
      const logActive=S.view==='admin'&&S.adminTab==='log';
      const logUnseen=adminLogUnseenCount();
      botNav.innerHTML=`
        <button class="bnav-btn ${talentActive?'active':''}" data-atab="talent">
          <span class="bnav-icon">${ic("users",22)}</span><span class="bnav-label">Talent</span>
          ${pend>0?`<span class="bnav-badge">${pend}</span>`:''}
        </button>
        <button class="bnav-btn ${listingsActive?'active':''}" data-atab="listings">
          <span class="bnav-icon">${ic("clipboard",22)}</span><span class="bnav-label">Listings</span>
        </button>
        <button class="bnav-btn ${calActive?'active':''}" data-atab="calendar">
          <span class="bnav-icon">${ic("calendar",22)}</span><span class="bnav-label">Calendar</span>
        </button>
        <button class="bnav-btn ${logActive?'active':''}" data-atab="log">
          <span class="bnav-icon">${ic("archive",22)}</span><span class="bnav-label">Log</span>
          ${logUnseen>0?`<span class="bnav-badge">${logUnseen}</span>`:''}
        </button>`;
      botNav.querySelectorAll('[data-atab]').forEach(el=>el.addEventListener('click',()=>{
        const t=el.dataset.atab;
        S.view='admin';
        if(t==='talent'){
          // land on the sub-tab last used, defaulting to Applications
          if(!['applications','users','notify'].includes(S.adminTab))S.adminTab='applications';
        }else{
          S.adminTab=t;
        }
        if(S.adminTab!=='notify'){S.notifyPreset=null;S.emailModal=null;}
        S.resetScrollOnRender=true;closeDrawer();render();
      }));
    }
  }

  const views={login:renderLogin,register:renderRegister,board:renderBoard,calendar:renderCalendar,inbox:renderInbox,profile:renderProfile,admin:renderAdmin};
  const scrollEl=$('scroll-area');
  const prevScroll=scrollEl?scrollEl.scrollTop:0;
  $('content').innerHTML=(views[S.view]||renderLogin)();
  if(S.resetScrollOnRender){
    scrollEl.scrollTop=0;
    S.resetScrollOnRender=false;
  } else if(scrollEl){
    scrollEl.scrollTop=prevScroll;
  }
  attachEvents();
}

function renderInPlace(){
  // Full re-render but explicitly no fade and exact scroll retention.
  const c=$('content');
  c.classList.remove('fade-out','fade-in');
  render();
}

function fadeRender(){
  const c=$('content');
  c.classList.add('fade-out');
  setTimeout(()=>{
    render();
    c.classList.remove('fade-out');
    c.classList.add('fade-in');
    setTimeout(()=>c.classList.remove('fade-in'),200);
  },180);
}

    </div>`;
  }).join('');

function renderListingCard(l,ctx){
  const {u,canResp,isAdmin,stOpen}=ctx;
  const cast=!!l.cast&&!isAdmin;
  const open=S.openListings[l.id]&&!cast;
  const resp=(canResp&&!cast)?getResp(u.email,l.id):null;
  let html=`<div class="lcard ${open?stOpen:''} ${cast?'cast':''}" id="lc-${l.id}" data-open-class="${stOpen}">
      ${cast?'<div class="cast-banner">Has Been Cast</div>':''}
      <div class="lcard-head" ${cast?'':`data-toggle="${l.id}"`}>
        <span class="lcard-ico">${esc(l.icon||'📋')}</span>
        <div class="lcard-info">
          <div class="lcard-title">${esc(l.title)}</div>
          <div class="lcard-sub">${esc(l.sub)}</div>
          <div class="lcard-sub" style="margin-top:1px;color:var(--text4)">${esc(l.date||'')}</div>
        </div>
        <div class="lcard-tags">
          ${isNew(l)?'<span class="tag tag-new">New</span>':''}
          ${l.urgent?'<span class="tag tag-urgent">Urgent</span>':''}
        </div>
        <span class="lchev ${open?'op':''}">▼</span>
      </div>`;
    if(open){
      const details=Object.entries(l.details||{}).filter(([,v])=>v);
      html+=`<div class="lbody">
        ${details.length?`<div class="detail-list">${details.map(([k,v])=>`<div class="dl-item"><span class="dl-key">${esc(k)}</span><span class="dl-val">${esc(v)}</span></div>`).join('')}</div>`:''}
        ${l.desc?`<p class="l-desc">${esc(l.desc)}</p>`:''}
        ${canResp?`
        <div style="display:flex;gap:10px;margin-top:10px">
          <button class="resp-btn-large resp-btn-yes ${resp==='yes'?'sel':''}" data-resp="${l.id}:yes">${ic("thumbs-up",15)} Interested</button>
          <button class="resp-btn-large resp-btn-no ${resp==='no'?'sel':''}" data-resp="${l.id}:no">${ic("thumbs-down",15)} Not Interested</button>
        </div>
        <div style="text-align:right;margin-top:6px">
          <button class="btn btn-ghost btn-sm" data-toggle="${l.id}">▲ Collapse</button>
        </div>
        `:`<div class="l-actions"><button class="btn btn-ghost btn-sm" data-toggle="${l.id}">▲</button></div>`}`;
      if(isAdmin){
        const resps=DB.responses[l.id]||{};
        const av=availTalent();
        const y=av.filter(t=>resps[t.email]==='yes').length;
        const n=av.filter(t=>resps[t.email]==='no').length;
        const tot=av.length;
        html+=`<div class="divider"></div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span class="pill p-yes">${ic("thumbs-up",12)} ${y}</span>
            <span class="pill p-no">${ic("thumbs-down",12)} ${n}</span>
            <span class="pill p-none">${tot-y-n} no resp</span>
            <button class="btn btn-ghost btn-xs" data-report="${l.id}" style="margin-left:auto">${ic("bar-chart",14)} Report</button>
          </div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  return html;
}

function renderBoard(){
  const u=S.user;
  // Determine the EFFECTIVE role for this view: a promoted talent (dual-role,
  // role==='admin' but not isMaster) viewing in 'talent' mode should see the
  // talent noticeboard, not the admin one — even though u.role is 'admin'.
  const isDualUser=u.role==='admin'&&!u.isMaster;
  const viewingAsAdmin=u.role==='admin'&&(!isDualUser||S.viewMode==='admin');
  const isAdmin=viewingAsAdmin;
  const canResp=!isAdmin;
  const unread=isAdmin?0:unreadCount(u.email);
  const email=u?.email;
  const wk=workListings().filter(l=>listingVisibleTo(l,email));
  const au=audListings().filter(l=>listingVisibleTo(l,email));
  const pd=pdListings().filter(l=>listingVisibleTo(l,email));
  let html='<div class="pg">';
  if(unread>0&&!isAdmin)html+=`<div class="alert alert-warn">🔔 <strong>${unread}</strong> unread notification${unread>1?'s':''} in your inbox.</div>`;
  if(u.onContract&&!isAdmin)html+=`<div class="contract-banner">🎭 <div>You are <strong>On Contract</strong>. You can still respond to listings below.</div></div>`;
  if(!wk.length&&!au.length&&!pd.length){
    html+=`<div class="empty-state"><span class="empty-icon">${ic("clipboard",44)}</span><div class="empty-txt">No listings posted yet.${isAdmin?'<br>Go to Listings in the admin panel to add one.':''}</div></div>`;
  } else {
    if(wk.length)html+=listingSection('Work Opportunities',wk,'red',canResp,isAdmin,u);
    if(au.length)html+=listingSection('Auditions',au,'amber',canResp,isAdmin,u);
    if(pd.length)html+=listingSection('Professional Development',pd,'blue',canResp,isAdmin,u);
  }
  html+='</div>';
  return html;
}

function listingSection(label,items,color,canResp,isAdmin,u){
  const st={red:{badge:'sb-red',dot:'sd-red',rule:'',open:'open'},
            amber:{badge:'sb-amber',dot:'sd-amber',rule:'sec-rule-a',open:'open-a'},
            blue:{badge:'sb-blue',dot:'sd-blue',rule:'sec-rule-b',open:'open-b'}}[color]||{badge:'sb-red',dot:'sd-red',rule:'',open:'open'};
  let html=`<div class="sec-hd">
    <span class="sec-badge ${st.badge}"><span class="sec-dot ${st.dot}"></span>${label}</span>
    <span class="sec-count">${items.length}</span>
    <div class="sec-rule ${st.rule}"></div>
  </div>`;
  for(const l of items){
    html+=renderListingCard(l,{u,canResp,isAdmin,stOpen:st.open});
  }
  return html;
}

function renderInbox(){
  const u=S.user,deleted=u.deletedNotifs||[],mine=DB.notifications.filter(n=>n.targets.includes(u.email)&&!deleted.includes(n.id)).reverse();
  const seen=u.seenNotifs||[];
  let html='<div class="pg"><div class="pg-header"><div class="pg-title">Notifications</div></div>';
  if(!mine.length){
    html+=`<div class="empty-state"><span class="empty-icon">${ic("bell",44)}</span><div class="empty-txt">No notifications yet.</div></div>`;
    return html+'</div>';
  }
  const st={red:{badge:'sb-red',dot:'sd-red',rule:''},
            amber:{badge:'sb-amber',dot:'sd-amber',rule:'sec-rule-a'},
            blue:{badge:'sb-blue',dot:'sd-blue',rule:'sec-rule-b'}};
  for(const cat of LOG_CATS){
    const items=mine.filter(n=>notifCat(n)===cat.key);
    if(!items.length)continue;
    const open=!!S.inboxOpen[cat.key];
    const unseen=items.filter(n=>!seen.includes(n.id)).length;
    const s=st[cat.color]||st.red;
    html+=`<div class="sec-hd log-sec-hd" data-inbox-sec="${cat.key}" style="cursor:pointer">
      <span class="sec-badge ${s.badge}"><span class="sec-dot ${s.dot}"></span>${ic(cat.icon,15)} ${cat.label}</span>
      <span class="sec-count">${items.length}</span>
      ${unseen?`<span class="log-bubble">${unseen}</span>`:''}
      <div class="sec-rule ${s.rule}"></div>
      <span class="log-sec-arrow">${open?'\u25BE':'\u25B8'}</span>
    </div>`;
    if(!open)continue;
    html+=sectionControls('inbox',cat);
    for(const n of items){
      const unread=!seen.includes(n.id);
      // Special contract-response notifications
      const isContractResp=n.isContractMsg;
      const isEvReminder=n.isEventReminder;
      html+=`<div class="notif-card ${unread?'unread':''}" style="display:flex;align-items:flex-start;gap:10px" data-markread="${n.id}" ${isEvReminder?'data-go-calendar="1" style="cursor:pointer"':''}>
        ${unread?'<div class="notif-dot" style="margin-top:4px;flex-shrink:0"></div>':'<div class="notif-spacer"></div>'}
        <div class="notif-body" style="flex:1;min-width:0">
          <div class="notif-title">${esc(n.title)}</div>
          <div class="notif-msg">${esc(n.msg)}</div>
          <div class="notif-meta">From ${esc(n.sentBy)} · ${n.sentAt}</div>
          ${isContractResp?`<div style="display:flex;gap:8px;margin-top:10px">
            <button class="btn btn-red btn-sm" data-go-board="${n.id}" style="flex:1">${ic("clipboard",14)} View the Noticeboard →</button>
          </div>`:''}
          ${isEvReminder?`<div style="margin-top:8px;font-size:.7rem;color:var(--amber-lt);font-family:var(--fh);font-weight:600">${ic("calendar",13)} Tap to view your calendar \u2192</div>`:''}
        </div>
        <button class="notif-del-btn" data-del-notif="${n.id}" title="Delete notification">${ic("trash",15)}</button>
      </div>`;
    }
  }
  html+='</div>';
  return html;
}

/* ── Log ── */
function purgeOldNotifications(){
  const cutoff=Date.now()-21*864e5;
  const before=DB.notifications.length;
  DB.notifications=DB.notifications.filter(n=>{
    // Keep if no sentAt or can't parse, or younger than 21 days
    if(!n.sentAt)return true;
    // sentAt format: DD/MM/YYYY HH:MM
    const m=String(n.sentAt).match(/^(\d{2})\/(\d{2})\/(\d{4})(?: (\d{2}):(\d{2}))?/);
    const d=m?new Date(+m[3],+m[2]-1,+m[1],+(m[4]||0),+(m[5]||0)):new Date(n.sentAt);
    return isNaN(d.getTime())||d.getTime()>cutoff;
  });
  if(DB.notifications.length!==before)dbSave();
}

      <input type="checkbox" ${on?'checked':''} data-push-pref="${cat.key}"/>

}
const LOG_CATS=[
  {key:'result',       label:'Results',        icon:'clapperboard', color:'amber'},
  {key:'confirmation', label:'Confirmations',  icon:'check-circle', color:'red'},
  {key:'event',        label:'Events',         icon:'calendar', color:'blue'},

  {key:'contract',     label:'End of Contract',icon:'file-text', color:'blue'},

];
function notifCat(n){
  if(n.category)return n.category;
  if(n.isContractMsg||n.filterDesc==='Contract warning')return'contract';
  const f=n.filterDesc||'';
  if(f==='Event reminder')return'event';

  if(f==='Reminder')return'reminder';
  if(f==='Audition result')return'result';
  return'announcement';
}
